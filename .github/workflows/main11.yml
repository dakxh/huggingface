name: Debug - Dump Environment Variables

# Trigger the workflow manually, similar to the anime pipeline
on:
  workflow_dispatch:
    inputs:
      debug_note:
        description: 'Optional note for this debug run'
        required: false
        default: 'Checking runner environment'

jobs:
  inspect-environment:
    runs-on: ubuntu-latest

    steps:
      - name: Print custom trigger note
        run: |
          echo "Starting debug run: ${{ inputs.debug_note }}"

      # This step outputs standard Linux environment variables
      # sorting them alphabetically for easier reading in the logs
      - name: Dump standard Environment Variables
        run: |
          echo "=== STANDARD ENVIRONMENT VARIABLES ==="
          env | sort
          echo "======================================"

      # Often, what you actually want to see is the GitHub-specific context
      # This dumps the entire GitHub context object as formatted JSON
      - name: Dump GitHub Context JSON
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "=== GITHUB CONTEXT OBJECT ==="
          echo "$GITHUB_CONTEXT"
          echo "============================="
          
      # Dumps runner-specific data (architecture, OS, tool paths)
      - name: Dump Runner Context
        env:
          RUNNER_CONTEXT: ${{ toJson(runner) }}
        run: |
          echo "=== RUNNER CONTEXT ==="
          echo "$RUNNER_CONTEXT"
          echo "======================"
