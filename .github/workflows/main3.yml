name: Discord Torrent to HLS Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg aria2 libcurl4-openssl-dev jq unzip
          pip install huggingface_hub guessit requests google-auth

      - name: Compile and Fetch from Discord
        id: discord_fetch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          g++ discord_manager.cpp -o discord_manager -lcurl
          
          OUTPUT=$(./discord_manager "$DISCORD_TOKEN" "$CHANNEL_ID" fetch)
          MSG_ID=$(echo "$OUTPUT" | cut -d'|' -f1)
          TARGET_LINK=$(echo "$OUTPUT" | cut -d'|' -f2-)
          
          if [ -z "$TARGET_LINK" ] || [ "$MSG_ID" == "empty" ] || [ "$MSG_ID" == "error" ]; then
            echo "❌ API Error or No valid link found."
            echo "found=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "Target acquired: $TARGET_LINK"
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV
          echo "TARGET_LINK=$TARGET_LINK" >> $GITHUB_ENV
          echo "found=true" >> $GITHUB_ENV

      - name: Download and Extract Payload
        if: env.found == 'true'
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          mkdir -p workspace
          echo "Evaluating Payload Type..."
          
          if [[ "$TARGET_LINK" == *drive.google.com* ]] || [[ "$TARGET_LINK" == *drive.usercontent.google.com* ]]; then
            
            # --- THE IDM WORKAROUND: Pre-Authenticated Direct Links ---
            if [[ "$TARGET_LINK" == *\&at=* ]] || [[ "$TARGET_LINK" == *confirm=t* ]]; then
              echo "🚀 Detected Pre-Authenticated Direct Drive Link. Bypassing APIs and fetching natively..."
              cd workspace
              curl -# -L -OJ "$TARGET_LINK"
              cd ..
            else
            # --- ENTERPRISE SA DOWNLOADER ---
              echo "🌐 Detected Standard Google Drive Link. Initializing Lightning SA Downloader..."
              
              cat << 'EOF' > gdrive_sa_dl.py
          import os, sys, re, json
          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          link = sys.argv[1]
          sa_json_str = os.environ.get('GCP_SA_JSON')

          if not sa_json_str:
              print("❌ CRITICAL ERROR: GCP_SA_JSON secret is missing.")
              sys.exit(1)

          try:
              sa_info = json.loads(sa_json_str)
              creds = service_account.Credentials.from_service_account_info(sa_info, scopes=['https://www.googleapis.com/auth/drive.readonly'])
              creds.refresh(Request())
              headers = {'Authorization': f'Bearer {creds.token}'}
          except Exception as e:
              print(f"❌ Authentication Failed: {e}")
              sys.exit(1)

          match = re.search(r'(id=|/d/|folders/)([a-zA-Z0-9_-]+)', link)
          if not match:
              print("❌ Could not extract ID from link.")
              sys.exit(1)
          file_id = match.group(2)

          def download_file(fid, fname):
              print(f"⬇️ Authenticated SA Download started for: {fname}")
              print(f"⏳ Downloading... (This will stay quiet to keep logs clean)")
              try:
                  url = f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media"
                  with requests.get(url, headers=headers, stream=True) as r:
                      r.raise_for_status()
                      with open(os.path.join("workspace", fname), 'wb') as f:
                          for chunk in r.iter_content(chunk_size=1024*1024*10): # 10MB Chunks
                              if chunk: f.write(chunk)
                  print(f"✅ Download complete: {fname}")
              except Exception as e:
                  print(f"\n❌ Download Failed: {e}")
                  print("⚠️ Ensure the Service Account email is added as a Viewer on this file!")
                  sys.exit(1)

          def process_node(fid):
              print(f"🔍 Inspecting Drive ID: {fid}")
              try:
                  url = f"https://www.googleapis.com/drive/v3/files/{fid}?fields=name,mimeType"
                  res = requests.get(url, headers=headers).json()
                  if 'error' in res:
                      raise Exception(res['error']['message'])
              except Exception as e:
                  print(f"❌ API Error: {e}")
                  print("⚠️ Did you forget to share the file/folder with the Service Account email?")
                  sys.exit(1)

              if res.get('mimeType') == 'application/vnd.google-apps.folder':
                  print(f"📂 Detected Folder: {res['name']}. Traversing contents...")
                  q_url = f"https://www.googleapis.com/drive/v3/files?q='{fid}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)"
                  children = requests.get(q_url, headers=headers).json().get('files', [])
                  for child in children:
                      if child['mimeType'] == 'application/vnd.google-apps.folder':
                          process_node(child['id'])
                      else:
                          download_file(child['id'], child['name'])
              else:
                  download_file(fid, res['name'])

          process_node(file_id)
          EOF
              
              python gdrive_sa_dl.py "$TARGET_LINK"
            fi
            
          elif [[ "$TARGET_LINK" == http* ]]; then
            echo "📎 Detected HTTP Link. Fetching torrent file explicitly..."
            curl -s -L -o "workspace/payload.torrent" "$TARGET_LINK"
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 "workspace/payload.torrent" -d workspace/
            
          else
            echo "🧲 Detected Magnet Link. Fetching metadata natively..."
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 --bt-save-metadata=true "$TARGET_LINK" -d workspace/
          fi
          
          echo "📦 Scanning for ZIP archives..."
          while read -u 9 ZIP_FILE; do
            echo "Extracting archive: $ZIP_FILE"
            unzip -q -o "$ZIP_FILE" -d workspace/
            rm "$ZIP_FILE"
          done 9< <(find workspace -type f -name "*.zip")
          
          VIDEO_COUNT=$(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \) | wc -l)
          if [ "$VIDEO_COUNT" -eq 0 ]; then
             echo "❌ CRITICAL ERROR: Failed to locate any video files after download and extraction. Exiting."
             exit 1
          fi

      - name: Generate Python Helper Scripts
        if: env.found == 'true'
        run: |
          cat << 'EOF' > routing.py
          import os, sys, re, subprocess
          from guessit import guessit
          
          file_path = sys.argv[1]
          filename = os.path.basename(file_path)
          g = guessit(filename)
          
          vid_type = g.get('type')
          title = str(g.get('title', '')).strip()
          
          # --- SMART TITLE FALLBACK ---
          year_match = re.search(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', filename)
          if year_match:
              raw_prefix = filename[:year_match.start()]
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title):
                  title = regex_title
                  
          if not title: title = 'Unknown_Title'
          title = title.title().replace(' ', '.')
          
          year = str(g.get('year', ''))
          
          resolution = str(g.get('screen_size', ''))
          if not resolution:
              resolution = '1080p'
          else:
              # Fallback standardize edge-cases
              if '4k' in resolution.lower() or '2160' in resolution.lower():
                  resolution = '2160p'
              elif '1080' in resolution.lower():
                  resolution = '1080p'

          # Check Metadata explicitly mapped dynamically via probing
          is_hdr = bool(re.search(r'(hdr|dovi|\bdv\b)', filename.lower()))
          dynamic_range = 'HDR' if is_hdr else 'SDR'

          is_imax = False
          if 'imax' in filename.lower():
              is_imax = True
          else:
              try:
                  cmd =['ffprobe', '-v', 'error', '-select_streams', 'v:0', '-show_entries', 'stream=width,height', '-of', 'csv=s=x:p=0', file_path]
                  res = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
                  w, h = map(float, res.stdout.strip().split('x'))
                  ar = w / h
                  if (1.40 <= ar <= 1.45) or (1.85 <= ar <= 1.95):
                      is_imax = True
              except: pass
              
          imax_tag = '.IMAX' if is_imax else ''
          variation_str = f"{resolution}{imax_tag}.{dynamic_range}"

          s = g.get('season')
          e = g.get('episode')
          
          if not s:
              s_match = re.search(r'[Ss](\d{1,2})[Ee]\d', filename)
              if s_match:
                  s = int(s_match.group(1))
              else:
                  s_path_match = re.search(r'[Ss]eason\s?0*(\d{1,2})', file_path, re.IGNORECASE)
                  if s_path_match:
                      s = int(s_path_match.group(1))

          if not e:
              anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', filename)
              if anime_match:
                  e = anime_match.group(1)
                  vid_type = 'episode'

          ep_title = str(g.get('episode_title', '')).title().replace(' ', '.')
          if ep_title and vid_type != 'episode':
              title = f'{title}.{ep_title}'
              
          title = re.sub(r'[^a-zA-Z0-9.\-]', '', title)
                  
          if vid_type == 'episode' or e:
              s_val = int(s[0] if isinstance(s, list) else s) if s else 1
              e_val = int(e[0] if isinstance(e, list) else e) if e else 1
              
              base_dir = title
              if year: base_dir += f'.{year}'
              
              legacy_quality = resolution
              if is_hdr: legacy_quality += '.HDR'
              if legacy_quality: base_dir += f'.{legacy_quality}'
              
              print(f'{base_dir}|Season.{s_val:02d}/Episode.{e_val:02d}|{is_imax}|{is_hdr}|{variation_str}|{resolution}')
          else:
              clean_name = title
              if year: clean_name += f'.{year}'
              base_dir = f'{clean_name}.{variation_str}'
              
              print(f'{base_dir}||{is_imax}|{is_hdr}|{variation_str}|{resolution}')
          EOF

          cat << 'EOF' > metadata_builder.py
          import os, json, requests, subprocess, sys, re, time, shutil
          from guessit import guessit
          import urllib.parse
          
          file_path = sys.argv[1]
          base_dir = sys.argv[2]
          sub_dir = sys.argv[3]
          audio_str = sys.argv[4]
          subs_str = sys.argv[5]
          
          # Inherited from Router mapping to prevent collision checks later on.
          is_imax_str = sys.argv[6]
          is_hdr_str = sys.argv[7]
          variation_str = sys.argv[8]
          resolution_str = sys.argv[9]
          
          is_imax = is_imax_str.lower() == 'true'
          is_hdr = is_hdr_str.lower() == 'true'
          
          available_audio = list(set([x.strip() for x in audio_str.split() if x.strip()]))
          available_subs = list(set([x.strip() for x in subs_str.split() if x.strip()]))
          
          date_added = int(time.time())
          
          filename = os.path.basename(file_path)
          target_dir = os.path.join(base_dir, sub_dir) if sub_dir else base_dir
          g = guessit(filename)
          
          title = str(g.get('title', '')).strip()
          
          # --- SMART TITLE FALLBACK ---
          year_match = re.search(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', filename)
          if year_match:
              raw_prefix = filename[:year_match.start()]
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title):
                  title = regex_title
                  
          if not title: title = 'Unknown Title'
          
          year = str(g.get('year', ''))

          dur_seconds = 0.0
          try:
              cmd =['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
              res = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              dur_seconds = float(res.stdout.strip())
          except: pass

          def format_dur(secs):
              h, m = int(secs // 3600), int((secs % 3600) // 60)
              return f'{h}h{m}m' if h > 0 else f'{m}m'
              
          duration_formatted = format_dur(dur_seconds)

          size_bytes = os.path.getsize(file_path)
          size_str = f'{round(size_bytes / (1024**3), 2)} GB'

          hf_repo = os.environ.get('HF_REPO', '')
          safe_target_dir = urllib.parse.quote(target_dir)
          manifest_url = f'https://huggingface.co/datasets/{hf_repo}/resolve/main/{safe_target_dir}/master.m3u8'

          tmdb_key = os.environ.get('TMDB_API_KEY')
          
          catalog_path = 'hls_output/global_catalog.json'

          # 🔥 FIX: JIT CLOUD SYNC FOR PARALLEL RUNNERS 🔥
          # We strictly fetch HF dataset state precisely when encoding is complete right before the push.
          if not os.path.exists(catalog_path):
              token = os.environ.get('HF_TOKEN')
              try:
                  from huggingface_hub import hf_hub_download
                  dl_path = hf_hub_download(repo_id=hf_repo, filename='global_catalog.json', repo_type='dataset', token=token, force_download=True)
                  shutil.copy(dl_path, catalog_path)
                  print('✅ JIT Sync: Successfully pulled latest global_catalog.json')
              except Exception as e:
                  print('⚠️ JIT Sync: No existing global_catalog.json found (or repo empty). Initializing a new one.')
                  with open(catalog_path, 'w') as f:
                      f.write('[]')
                      
          try:
              with open(catalog_path, 'r') as f:
                  catalog = json.load(f)
          except:
              catalog =[]
              
          if sub_dir:
              # ====== TV SHOW ======
              s_val = g.get('season')
              e_val = g.get('episode')
              
              if not s_val:
                  s_match = re.search(r'[Ss](\d{1,2})[Ee]\d', filename)
                  if s_match:
                      s_val = int(s_match.group(1))
                  else:
                      s_path_match = re.search(r'[Ss]eason\s?0*(\d{1,2})', file_path, re.IGNORECASE)
                      if s_path_match:
                          s_val = int(s_path_match.group(1))

              if not e_val:
                  anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', filename)
                  if anime_match:
                      e_val = int(anime_match.group(1))
              
              season_num = int(s_val[0] if isinstance(s_val, list) else s_val) if s_val else 1
              episode_num = int(e_val[0] if isinstance(e_val, list) else e_val) if e_val else 1
              
              show_meta_path = f'hls_output/{base_dir}/metadata.json'
              show_meta = {
                  'id': 0, 'type': 'series', 'title': title, 'year': year, 'rating': 0.0,
                  'quality': resolution_str, 'duration': '0m', 'IMAX': is_imax, 'HDR': is_hdr,
                  'poster_url': '', 'backdrop_url': '', 'overview': '', 'date_added': date_added,
                  '_total_secs': 0.0, '_ep_count': 0, 'episodes':[]
              }
              
              if os.path.exists(show_meta_path):
                  try:
                      with open(show_meta_path, 'r') as f:
                          existing_data = json.load(f)
                          show_meta.update(existing_data)
                          show_meta['date_added'] = date_added
                  except: pass
                  
              show_meta['_total_secs'] += dur_seconds
              show_meta['_ep_count'] += 1
              show_meta['duration'] = format_dur(show_meta['_total_secs'] / show_meta['_ep_count'])
              
              show_meta['quality'] = resolution_str
              if is_imax: show_meta['IMAX'] = True
              if is_hdr: show_meta['HDR'] = True
                  
              if tmdb_key and title != 'Unknown Title' and show_meta['id'] == 0:
                  search_url = f'https://api.themoviedb.org/3/search/tv?api_key={tmdb_key}&query={title}'
                  try:
                      res = requests.get(search_url).json()
                      if res.get('results'):
                          match = res['results'][0]
                          show_meta['id'] = match.get('id', 0)
                          show_meta['title'] = match.get('name', title)
                          if not show_meta['year']: show_meta['year'] = match.get('first_air_date', '')[:4]
                          show_meta['overview'] = match.get('overview', '')
                          show_meta['rating'] = round(match.get('vote_average', 0.0), 1)
                          if match.get('poster_path'): show_meta['poster_url'] = f"https://image.tmdb.org/t/p/w600_and_h900_bestv2{match.get('poster_path')}"
                          if match.get('backdrop_path'): show_meta['backdrop_url'] = f"https://image.tmdb.org/t/p/w1280_and_h720_multi_faces{match.get('backdrop_path')}"
                  except: pass
                  
              episode_name = f'Episode {episode_num}'
              if tmdb_key and show_meta['id'] != 0:
                  try:
                      ep_url = f'https://api.themoviedb.org/3/tv/{show_meta["id"]}/season/{season_num}/episode/{episode_num}?api_key={tmdb_key}'
                      ep_res = requests.get(ep_url).json()
                      if ep_res.get('name'):
                          episode_name = ep_res['name']
                  except: pass
                  
              if 'episodes' not in show_meta:
                  show_meta['episodes'] =[]
              
              ep_entry = {
                  'season_number': season_num,
                  'episode_number': episode_num,
                  'episode_name': episode_name,
                  'quality': resolution_str,
                  'date_added': date_added,
                  'hls_manifest_url': manifest_url
              }
              
              show_meta['episodes'] =[ep for ep in show_meta['episodes'] if not (ep['season_number'] == season_num and ep['episode_number'] == episode_num)]
              show_meta['episodes'].append(ep_entry)
              show_meta['episodes'] = sorted(show_meta['episodes'], key=lambda x: (x['season_number'], x['episode_number']))
              
              with open(show_meta_path, 'w') as f:
                  json.dump(show_meta, f, indent=4)
                  
              ep_meta = {
                  'id': show_meta['id'],
                  'series_title': title,
                  'season_number': season_num,
                  'episode_number': episode_num,
                  'episode_name': episode_name,
                  'original_filename': filename,
                  'quality': resolution_str,
                  'duration': duration_formatted,
                  'size': size_str,
                  'available_audio': available_audio,
                  'available_subs': available_subs,
                  'date_added': date_added,
                  'hls_manifest_url': manifest_url
              }
              with open(f'hls_output/{target_dir}/metadata.json', 'w') as f:
                  json.dump(ep_meta, f, indent=4)
                  
              series_metadata_url = f"https://huggingface.co/datasets/{hf_repo}/resolve/main/{urllib.parse.quote(base_dir)}/metadata.json"
              
              catalog =[item for item in catalog if item.get('type') != 'episode']
              catalog =[item for item in catalog if not (item.get('type') == 'series' and item.get('title') == show_meta['title'])]
              
              catalog_entry = {
                  'id': show_meta['id'],
                  'type': 'series',
                  'title': show_meta['title'],
                  'year': show_meta['year'],
                  'quality': resolution_str,
                  'date_added': date_added,
                  'series_metadata_url': series_metadata_url,
                  'poster_url': show_meta.get('poster_url', '')
              }
              catalog.append(catalog_entry)
                      
          else:
              # ====== MOVIE NEW METADATA ROUTINE ======
              
              movie_meta = {
                  'id': 0, 'type': 'movie', 'original_filename': filename, 'title': title,
                  'year': year, 'rating': 0.0, 'quality': resolution_str, 
                  'duration': duration_formatted, 'IMAX': is_imax, 'HDR': is_hdr, 'poster_url': '',
                  'backdrop_url': '', 'hls_manifest_url': manifest_url, 'overview': '',
                  'available_audio': available_audio,
                  'available_subs': available_subs,
                  'date_added': date_added
              }
              
              if tmdb_key and title != 'Unknown Title':
                  search_url = f'https://api.themoviedb.org/3/search/movie?api_key={tmdb_key}&query={title}'
                  if year: search_url += f'&year={year}'
                  try:
                      res = requests.get(search_url).json()
                      if res.get('results'):
                          match = res['results'][0]
                          movie_meta['id'] = match.get('id', 0)
                          movie_meta['title'] = match.get('title', title)
                          if not movie_meta['year']: movie_meta['year'] = match.get('release_date', '')[:4]
                          movie_meta['overview'] = match.get('overview', '')
                          movie_meta['rating'] = round(match.get('vote_average', 0.0), 1)
                          if match.get('poster_path'): movie_meta['poster_url'] = f"https://image.tmdb.org/t/p/w600_and_h900_bestv2{match.get('poster_path')}"
                          if match.get('backdrop_path'): movie_meta['backdrop_url'] = f"https://image.tmdb.org/t/p/w1280_and_h720_multi_faces{match.get('backdrop_path')}"
                  except: pass
                  
              with open(f'hls_output/{target_dir}/metadata.json', 'w') as f:
                  json.dump(movie_meta, f, indent=4)
                  
              # Smart dictionary merge sequence tracking
              existing_idx = None
              for i, item in enumerate(catalog):
                  if item.get('type') == 'movie' and item.get('title') == movie_meta['title'] and item.get('year') == movie_meta['year']:
                      existing_idx = i
                      break
                      
              if existing_idx is not None:
                  if 'quality' in catalog[existing_idx]:
                      del catalog[existing_idx]['quality']
                  
                  if 'available_resolutions' not in catalog[existing_idx]: catalog[existing_idx]['available_resolutions'] = []
                  if 'available_variations' not in catalog[existing_idx]: catalog[existing_idx]['available_variations'] = []
                  if 'hls_manifest_url' not in catalog[existing_idx] or not isinstance(catalog[existing_idx]['hls_manifest_url'], dict):
                      catalog[existing_idx]['hls_manifest_url'] = {}
                  
                  # Append Resolution Logically + Integer sorting
                  if resolution_str not in catalog[existing_idx]['available_resolutions']:
                      catalog[existing_idx]['available_resolutions'].append(resolution_str)
                      catalog[existing_idx]['available_resolutions'] = sorted(catalog[existing_idx]['available_resolutions'], key=lambda r: int(''.join(filter(str.isdigit, r)) or 0))
                      
                  # Append Variation Link Logically
                  if variation_str not in catalog[existing_idx]['available_variations']:
                      catalog[existing_idx]['available_variations'].append(variation_str)
                  
                  catalog[existing_idx]['hls_manifest_url'][variation_str] = manifest_url
                  
                  # Fallback injection block in case metadata TMDB keys shifted
                  if catalog[existing_idx]['id'] == 0 and movie_meta['id'] != 0:
                      catalog[existing_idx]['id'] = movie_meta['id']
                      catalog[existing_idx]['poster_url'] = movie_meta.get('poster_url', '')
                  
                  # Graceful front-end sorting Upgrade logic
                  catalog[existing_idx]['date_added'] = date_added
              else:
                  catalog_entry = {
                      'id': movie_meta['id'],
                      'type': 'movie',
                      'title': movie_meta['title'],
                      'year': movie_meta['year'],
                      'date_added': date_added,
                      'available_resolutions': [resolution_str],
                      'available_variations': [variation_str],
                      'hls_manifest_url': {variation_str: manifest_url},
                      'poster_url': movie_meta.get('poster_url', '')
                  }
                  catalog.append(catalog_entry)
              
          with open(catalog_path, 'w') as f:
              json.dump(catalog, f, indent=4)
          EOF

      - name: Process Master Loop (Batch Parsing, FFmpeg, Metadata)
        if: env.found == 'true'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          HF_REPO: ${{ secrets.HF_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p hls_output
          
          while read -u 9 VIDEO_FILE; do
            echo "================================================================"
            echo "🎬 PROCESSING FILE: $VIDEO_FILE"
            
            # 1. DYNAMIC ROUTING EXPORT BINDINGS
            ROUTING=$(python routing.py "$VIDEO_FILE")
            
            BASE_DIR=$(echo "$ROUTING" | awk -F'|' '{print $1}')
            SUB_DIR=$(echo "$ROUTING" | awk -F'|' '{print $2}')
            IS_IMAX=$(echo "$ROUTING" | awk -F'|' '{print $3}')
            IS_HDR=$(echo "$ROUTING" | awk -F'|' '{print $4}')
            VARIATION=$(echo "$ROUTING" | awk -F'|' '{print $5}')
            RESOLUTION=$(echo "$ROUTING" | awk -F'|' '{print $6}')
            
            if [ -n "$SUB_DIR" ]; then
                TARGET_DIR="$BASE_DIR/$SUB_DIR"
            else
                TARGET_DIR="$BASE_DIR"
            fi
            
            # --- BASH COLLISION LOCK ---
            ORIG_TARGET_DIR="$TARGET_DIR"
            COUNTER=2
            while [ -d "hls_output/$TARGET_DIR" ] && [ "$(ls -A "hls_output/$TARGET_DIR" 2>/dev/null)" ]; do
              echo "⚠️ Collision detected! $TARGET_DIR already exists."
              TARGET_DIR="${ORIG_TARGET_DIR}_Part${COUNTER}"
              COUNTER=$((COUNTER+1))
            done
            
            echo "📁 Final Safe HF Directory: $TARGET_DIR"
            mkdir -p "hls_output/$TARGET_DIR"
            mkdir -p "hls_output/$BASE_DIR"
            
            # 2. FFMPEG TRANSCODING
            VIDEO_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
            if [[ "$VIDEO_CODEC" == "hevc" ]]; then
              V_TAG="-tag:v hvc1"
              M3U8_V_CODEC="hvc1.2.4.L153.B0"
            else
              V_TAG="-tag:v avc1"
              M3U8_V_CODEC="avc1.640028"
            fi

            STREAMS=$(ffprobe -v error -show_entries stream=index,codec_type:stream_tags=language,title -of csv=p=0 "$VIDEO_FILE" | tr '[:upper:]' '[:lower:]')
            AUDIO_MAPS="-map 0:V:0"
            VAR_STREAM_MAP="v:0,agroup:audio "
            AUDIO_ENCODING=""
            
            A_IDX=0
            STREAM_IDX=1
            AUDIO_SED_CMDS=""
            
            LANG_REGEX="(^|[^a-z])(en|eng|english|hi|hin|hindi|te|tel|telugu)([^a-z]|$)"
            AUDIO_LANG_REGEX="(^|[^a-z])(en|eng|english|hi|hin|hindi|te|tel|telugu|ja|jap|jpn|japan|japanese)([^a-z]|$)"
            
            DETECTED_AUDIO=""
            DETECTED_SUBS=""
            
            while IFS=',' read -r index ctype lang title; do
              if [[ "$ctype" == "audio" ]]; then
                if [[ "$lang $title" =~ $AUDIO_LANG_REGEX ]]; then
                  CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  CHANNELS=$(ffprobe -v error -select_streams $index -show_entries stream=channels -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
                  
                  case "${lang,,}" in
                    en|eng|english) DISPLAY_LANG="English" ;;
                    hi|hin|hindi) DISPLAY_LANG="Hindi" ;;
                    te|tel|telugu) DISPLAY_LANG="Telugu" ;;
                    ja|jap|jpn|japan|japanese) DISPLAY_LANG="Japanese" ;;
                    *) DISPLAY_LANG="$(echo "${lang:-Unknown}" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" ;;
                  esac

                  # ⚡ ENHANCED FORMAT CATCHER WITH SMART CHANNEL LOGIC ⚡
                  if [[ "$CODEC" =~ ^(ac3|eac3|dts|truehd|flac|alac|wav|pcm.*|opus|vorbis)$ ]]; then
                    # Only apply 5.1 Center-bleed if the source has MORE than 2 channels
                    if [[ -n "$CHANNELS" && "$CHANNELS" =~ ^[0-9]+$ && "$CHANNELS" -gt 2 ]]; then
                      AUDIO_ENCODING+=" -c:a:$A_IDX aac -b:a:$A_IDX 512k -filter:a:$A_IDX pan=5.1|FL=FL+0.7*FC|FR=FR+0.7*FC|FC=FC|LFE=LFE|BL=BL|BR=BR,acompressor=threshold=-9dB:ratio=6:attack=5:release=300:makeup=0,dynaudnorm=f=150:g=15:m=40.0 "
                    else
                      # It's native Stereo/Mono but in a heavy codec. Don't upmix to 5.1, just normalize and keep layout.
                      AUDIO_ENCODING+=" -c:a:$A_IDX aac -b:a:$A_IDX 512k -filter:a:$A_IDX acompressor=threshold=-9dB:ratio=6:attack=5:release=300:makeup=0,dynaudnorm=f=150:g=15:m=40.0,aformat=channel_layouts=stereo "
                    fi
                    DISPLAY_BITRATE="512kbps"
                  else
                    AUDIO_ENCODING+=" -c:a:$A_IDX copy "
                    ORIG_BITRATE=$(ffprobe -v error -select_streams $index -show_entries stream=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
                    if [[ -n "$ORIG_BITRATE" && "$ORIG_BITRATE" =~ ^[0-9]+$ ]]; then
                      DISPLAY_BITRATE="$((ORIG_BITRATE / 1000))kbps"
                    else
                      DISPLAY_BITRATE="Original"
                    fi
                  fi
                  
                  AUDIO_MAPS="$AUDIO_MAPS -map 0:$index"
                  VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und} "
                  DETECTED_AUDIO="$DETECTED_AUDIO ${lang:-und}"
                  
                  DEFAULT_FLAG="YES"
                  if [ "$A_IDX" -gt 0 ]; then DEFAULT_FLAG="NO"; fi
                  AUDIO_SED_CMDS+="s/NAME=\"audio_${STREAM_IDX}\"[,]*DEFAULT=YES/NAME=\"${DISPLAY_LANG} - ${DISPLAY_BITRATE}\",DEFAULT=${DEFAULT_FLAG}/g; s/NAME=\"audio_${STREAM_IDX}\"/NAME=\"${DISPLAY_LANG} - ${DISPLAY_BITRATE}\",DEFAULT=${DEFAULT_FLAG}/g; "
                  
                  A_IDX=$((A_IDX + 1))
                  STREAM_IDX=$((STREAM_IDX + 1))
                fi
              fi
            done <<< "$STREAMS"
            
            if [[ "$A_IDX" -eq 0 ]]; then
              AUDIO_MAPS="$AUDIO_MAPS -map 0:a:0"
              DETECTED_AUDIO="und"
              CODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
              CHANNELS=$(ffprobe -v error -select_streams a:0 -show_entries stream=channels -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
              
              if [[ "$CODEC" =~ ^(ac3|eac3|dts|truehd|flac|alac|wav|pcm.*|opus|vorbis)$ ]]; then
                if [[ -n "$CHANNELS" && "$CHANNELS" =~ ^[0-9]+$ && "$CHANNELS" -gt 2 ]]; then
                  AUDIO_ENCODING+=" -c:a:$A_IDX aac -b:a:$A_IDX 512k -filter:a:$A_IDX pan=5.1|FL=FL+0.7*FC|FR=FR+0.7*FC|FC=FC|LFE=LFE|BL=BL|BR=BR,acompressor=threshold=-9dB:ratio=6:attack=5:release=300:makeup=0,dynaudnorm=f=150:g=15:m=40.0 "
                else
                  AUDIO_ENCODING+=" -c:a:$A_IDX aac -b:a:$A_IDX 512k -filter:a:$A_IDX acompressor=threshold=-9dB:ratio=6:attack=5:release=300:makeup=0,dynaudnorm=f=150:g=15:m=40.0,aformat=channel_layouts=stereo "
                fi
                DISPLAY_BITRATE="512kbps"
              else
                AUDIO_ENCODING=" -c:a:0 copy "
                ORIG_BITRATE=$(ffprobe -v error -select_streams a:0 -show_entries stream=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
                if [[ -n "$ORIG_BITRATE" && "$ORIG_BITRATE" =~ ^[0-9]+$ ]]; then
                  DISPLAY_BITRATE="$((ORIG_BITRATE / 1000))kbps"
                else
                  DISPLAY_BITRATE="Original"
                fi
              fi
              
              VAR_STREAM_MAP="v:0,agroup:audio a:0,agroup:audio,language:und "
              AUDIO_SED_CMDS+="s/NAME=\"audio_1\"[,]*DEFAULT=YES/NAME=\"Unknown - ${DISPLAY_BITRATE}\",DEFAULT=YES/g; s/NAME=\"audio_1\"/NAME=\"Unknown - ${DISPLAY_BITRATE}\",DEFAULT=YES/g; "
            fi
            VAR_STREAM_MAP="${VAR_STREAM_MAP% }"
            
            if ! ffmpeg -nostdin -fflags +genpts -i "$VIDEO_FILE" \
              $AUDIO_MAPS -c:v copy $AUDIO_ENCODING $V_TAG \
              -avoid_negative_ts make_zero -muxdelay 0 -muxpreload 0 \
              -max_muxing_queue_size 9999 -f hls -hls_segment_type mpegts \
              -hls_segment_filename "hls_output/$TARGET_DIR/stream_%v_%04d.ts" \
              -var_stream_map "$VAR_STREAM_MAP" -master_pl_name master.m3u8 -hls_time 10 -hls_list_size 0 \
              "hls_output/$TARGET_DIR/stream_%v.m3u8"; then
              echo "❌ FFMPEG CRASHED! Skipping to next file..."
              continue
            fi
            
            # --- APPLY AUDIO NAMING REPLACEMENTS ---
            if [ -n "$AUDIO_SED_CMDS" ]; then
              sed -i -e "$AUDIO_SED_CMDS" "hls_output/$TARGET_DIR/master.m3u8"
            fi
            
            # ⚡ REMOVE REDUNDANT AUDIO-ONLY STREAM-INF TAGS ⚡
            awk '/^#EXT-X-STREAM-INF/ {
                if ($0 ~ /RESOLUTION=/) {
                    print $0
                    getline next_line
                    print next_line
                } else {
                    getline next_line # skip the URI line
                }
                next
            }
            { print $0 }' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/master_clean.m3u8" && mv "hls_output/$TARGET_DIR/master_clean.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
            
            # ⚡ THE HEVC CHROME BYPASS ⚡
            sed -i -E 's/,CODECS="[^"]*"//g' "hls_output/$TARGET_DIR/master.m3u8"
            
            if ! grep -q "stream_0.m3u8" "hls_output/$TARGET_DIR/master.m3u8"; then
              BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
              if [[ -z "$BITRATE" || "$BITRATE" == "N/A" ]]; then
                SIZE=$(stat -c %s "$VIDEO_FILE")
                DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
                BITRATE=$(awk "BEGIN {print int(($SIZE * 8) / $DURATION)}")
              fi
              BANDWIDTH=$(awk "BEGIN {print int($BITRATE * 1.1)}")
              RESOLUTION=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 "$VIDEO_FILE" 2>/dev/null)
              [ -z "$RESOLUTION" ] && RESOLUTION="1920x1080"
              printf '\n#EXT-X-STREAM-INF:BANDWIDTH=%s,RESOLUTION=%s,AUDIO="group_audio"\nstream_0.m3u8\n' "$BANDWIDTH" "$RESOLUTION" >> "hls_output/$TARGET_DIR/master.m3u8"
            fi
              
            HAS_SUBS="false"
            echo "" >> "hls_output/$TARGET_DIR/master.m3u8"
            
            VID_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
            VID_DUR_INT=$(printf "%.0f" "$VID_DUR" 2>/dev/null || echo "36000")
            
            # --- PASS 1 & 2: SUBTITLE LOGIC ---
            while IFS=',' read -r index ctype lang title; do
              if [[ "$ctype" == "subtitle" ]]; then
                if [[ "$lang $title" =~ $LANG_REGEX ]]; then
                  SUB_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  if [[ "$SUB_CODEC" =~ ^(subrip|ass|webvtt|mov_text|tx3g)$ ]]; then
                    VTT_BASENAME="subs_${index}_${lang:-und}.vtt"
                    M3U8_BASENAME="subs_${index}_${lang:-und}.m3u8"
                    VTT_FILE="hls_output/$TARGET_DIR/$VTT_BASENAME"
                    M3U8_FILE="hls_output/$TARGET_DIR/$M3U8_BASENAME"
                    
                    if ffmpeg -nostdin -y -i "$VIDEO_FILE" -map "0:$index" "$VTT_FILE" >/dev/null 2>&1; then
                      if [ -s "$VTT_FILE" ]; then
                        
                        # ⚡ TS SYNC FIX: Inject strict PTS map ⚡
                        sed -i '1s/^WEBVTT.*/WEBVTT\nX-TIMESTAMP-MAP=LOCAL:00:00:00.000,MPEGTS:0/' "$VTT_FILE"
                        
                        HAS_SUBS="true"
                        DETECTED_SUBS="$DETECTED_SUBS ${lang:-und}"
                        
                        SUB_LANG="Unknown"
                        case "${lang,,}" in
                          en|eng|english) SUB_LANG="English" ;;
                          hi|hin|hindi) SUB_LANG="Hindi" ;;
                          te|tel|telugu) SUB_LANG="Telugu" ;;
                          ja|jap|jpn|japan|japanese) SUB_LANG="Japanese" ;;
                          *) [ -n "$lang" ] && SUB_LANG="$(echo "$lang" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" ;;
                        esac

                        CLEAN_TITLE=$(echo "$title" | tr -cd 'a-zA-Z0-9 ()[]_-' | sed 's/^ *//;s/ *$//')
                        CLEAN_TITLE="$(echo "$CLEAN_TITLE" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2)); print $0}')"
                        CLEAN_TITLE=$(echo "$CLEAN_TITLE" | sed 's/\bSdh\b/SDH/g; s/\bCc\b/CC/g')

                        if [[ "${CLEAN_TITLE,,}" == "${lang,,}" || "${CLEAN_TITLE,,}" == "${SUB_LANG,,}" ]]; then
                          CLEAN_TITLE=""
                        fi

                        if [ -n "$CLEAN_TITLE" ]; then
                          CLEAN_TITLE_LOWER="${CLEAN_TITLE,,}"
                          SUB_LANG_LOWER="${SUB_LANG,,}"
                          if [[ "$CLEAN_TITLE_LOWER" == "$SUB_LANG_LOWER"* ]]; then
                            FINAL_SUB_NAME="$CLEAN_TITLE"
                          else
                            FINAL_SUB_NAME="${SUB_LANG} - ${CLEAN_TITLE}"
                          fi
                        else
                          FINAL_SUB_NAME="${SUB_LANG}"
                        fi
                        
                        [ -z "$FINAL_SUB_NAME" ] && FINAL_SUB_NAME="Sub_${index}"
                        
                        printf "#EXTM3U\n#EXT-X-TARGETDURATION:%s\n#EXT-X-VERSION:3\n#EXT-X-PLAYLIST-TYPE:VOD\n#EXTINF:%s,\n%s\n#EXT-X-ENDLIST\n" "$VID_DUR_INT" "$VID_DUR" "$VTT_BASENAME" > "$M3U8_FILE"
                        printf '#EXT-X-MEDIA:TYPE=SUBTITLES,GROUP-ID="group_subs",NAME="%s",LANGUAGE="%s",URI="%s"\n' "$FINAL_SUB_NAME" "${lang:-und}" "$M3U8_BASENAME" >> "hls_output/$TARGET_DIR/master.m3u8"
                      else
                        rm -f "$VTT_FILE"
                      fi
                    fi
                  fi
                fi
              fi
            done <<< "$STREAMS"
            
            if [[ "$HAS_SUBS" == "false" ]]; then
              echo "⚠️ No matching subtitles found. Scanning unidentified tracks for English..."
              
              cat << 'EOF' > detect_eng.py
          import sys, re
          try:
              with open(sys.argv[1], 'r', encoding='utf-8', errors='ignore') as f:
                  text = f.read().lower()
              words = re.findall(r'\b[a-z]{2,5}\b', text)
              eng = {'the','and','that','have','for','not','with','you','this','but','his','from','they','say','she','will','what','who','get','when','make','can','like','time','just','know','take','your','good','some','could','them','other','than','then','now','look','only','come','over','think','also','back','after','how','our','first','well','way','even','want','because','any','these','give','most','are','was','were'}
              print('true' if sum(1 for w in words if w in eng) > 15 else 'false')
          except:
              print('false')
          EOF

              while IFS=',' read -r index ctype lang title; do
                if [[ "$ctype" == "subtitle" ]]; then
                  SUB_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  if [[ "$SUB_CODEC" =~ ^(subrip|ass|webvtt|mov_text|tx3g)$ ]]; then
                    TEMP_VTT="hls_output/$TARGET_DIR/temp_${index}.vtt"
                    
                    if ffmpeg -nostdin -y -i "$VIDEO_FILE" -map "0:$index" "$TEMP_VTT" >/dev/null 2>&1; then
                      if [ -s "$TEMP_VTT" ]; then
                        IS_ENGLISH=$(python detect_eng.py "$TEMP_VTT")
                        
                        if [[ "$IS_ENGLISH" == "true" ]]; then
                          echo "✅ English auto-detected in track index $index!"
                          
                          # ⚡ TS SYNC FIX: Inject strict PTS map ⚡
                          sed -i '1s/^WEBVTT.*/WEBVTT\nX-TIMESTAMP-MAP=LOCAL:00:00:00.000,MPEGTS:0/' "$TEMP_VTT"
                          
                          VTT_BASENAME="subs_${index}_eng.vtt"
                          M3U8_BASENAME="subs_${index}_eng.m3u8"
                          
                          mv "$TEMP_VTT" "hls_output/$TARGET_DIR/$VTT_BASENAME"
                          HAS_SUBS="true"
                          DETECTED_SUBS="$DETECTED_SUBS eng"
                          
                          printf "#EXTM3U\n#EXT-X-TARGETDURATION:%s\n#EXT-X-VERSION:3\n#EXT-X-PLAYLIST-TYPE:VOD\n#EXTINF:%s,\n%s\n#EXT-X-ENDLIST\n" "$VID_DUR_INT" "$VID_DUR" "$VTT_BASENAME" > "hls_output/$TARGET_DIR/$M3U8_BASENAME"
                          printf '#EXT-X-MEDIA:TYPE=SUBTITLES,GROUP-ID="group_subs",NAME="English (Auto)",LANGUAGE="eng",URI="%s"\n' "$M3U8_BASENAME" >> "hls_output/$TARGET_DIR/master.m3u8"
                          break
                        else
                          rm -f "$TEMP_VTT"
                        fi
                      else
                        rm -f "$TEMP_VTT"
                      fi
                    fi
                  fi
                fi
              done <<< "$STREAMS"
              rm -f detect_eng.py
            fi
            
            if [[ "$HAS_SUBS" == "true" ]]; then
              sed -i '/RESOLUTION=/ s/AUDIO="group_audio"/AUDIO="group_audio",SUBTITLES="group_subs"/' "hls_output/$TARGET_DIR/master.m3u8"
            fi
            
            HF_BASE="https://huggingface.co/datasets/${{ secrets.HF_REPO }}/resolve/main/${TARGET_DIR}/"
            HF_BASE=$(python -c "import urllib.parse; print(urllib.parse.quote('$HF_BASE', safe=':/'))")
            find "hls_output/$TARGET_DIR" -name "*.m3u8" -exec sed -i -e "s|^[^#]|${HF_BASE}&|g" -e "s|URI=\"|URI=\"${HF_BASE}|g" {} +

            # 3. HIGH-FUNCTIONAL PIPELINE GENERATOR + JIT CLOUD SYNC SEQUENCE
            python metadata_builder.py "$VIDEO_FILE" "$BASE_DIR" "$SUB_DIR" "${DETECTED_AUDIO:-und}" "${DETECTED_SUBS:-}" "$IS_IMAX" "$IS_HDR" "$VARIATION" "$RESOLUTION"

          done 9< <(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \))
          
          if [ ! -d "hls_output" ] || [ -z "$(ls -A hls_output)" ]; then
            echo "❌ CRITICAL ERROR: hls_output is empty. Processing failed."
            exit 1
          fi

      - name: Upload Output to Hugging Face
        if: env.found == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          
          repo = os.environ.get('HF_REPO')
          token = os.environ.get('HF_TOKEN')
          
          api = HfApi(token=token)
          
          print('🚀 Initiating batch upload to Hugging Face via upload_large_folder...')
          
          try:
              api.upload_large_folder(
                  folder_path='hls_output',
                  repo_id=repo,
                  repo_type='dataset',
                  ignore_patterns=['*.torrent', '*.zip', 'temp_*']
              )
              print('✅ Upload completed successfully.')
          except Exception as e:
              print(f'❌ Upload failed: {e}')
              exit(1)
          "

      - name: Report Success to Discord
        if: env.found == 'true' && success()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          QUEUE_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          TOTAL_FILES=$(find hls_output -type f | wc -l)
          TOTAL_SIZE=$(du -sh hls_output | cut -f1)
          
          STATUS_MSG="✅ **Batch Upload Complete!** \n🎬 Generated: \`${TOTAL_FILES} chunks/files\`\n📦 Total Size: \`${TOTAL_SIZE}\`\n🌐 CDN Ready on HuggingFace."
          
          ./discord_manager "$DISCORD_TOKEN" "$QUEUE_CHANNEL_ID" delete "$MSG_ID"
          ./discord_manager "$DISCORD_TOKEN" "$PING_CHANNEL_ID" send "$STATUS_MSG"

      - name: Report Failure to Discord
        if: env.found == 'true' && failure()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          FAIL_MSG="❌ **Pipeline Failed!** \n🚨 The Torrent/Drive-to-HLS job crashed during execution.\n🔗 [View Action Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          PAYLOAD=$(jq -n --arg content "$FAIL_MSG" '{content: $content}')
          
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" \
               -H "Content-Type: application/json" \
               -H "User-Agent: DiscordBot (https://github.com, 1.0)" \
               -X POST \
               -d "$PAYLOAD" \
               "https://discord.com/api/v10/channels/$PING_CHANNEL_ID/messages"
