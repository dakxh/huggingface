name: Discord Torrent to HLS Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg aria2 libcurl4-openssl-dev jq unzip
          pip install huggingface_hub guessit requests

      - name: Compile and Fetch from Discord
        id: discord_fetch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          g++ discord_manager.cpp -o discord_manager -lcurl
          
          OUTPUT=$(./discord_manager "$DISCORD_TOKEN" "$CHANNEL_ID" fetch)
          MSG_ID=$(echo "$OUTPUT" | cut -d'|' -f1)
          TARGET_LINK=$(echo "$OUTPUT" | cut -d'|' -f2-)
          
          if [ -z "$TARGET_LINK" ] || [ "$MSG_ID" == "empty" ] || [ "$MSG_ID" == "error" ]; then
            echo "❌ API Error or No valid link found."
            echo "found=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "Target acquired: $TARGET_LINK"
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV
          echo "TARGET_LINK=$TARGET_LINK" >> $GITHUB_ENV
          echo "found=true" >> $GITHUB_ENV

      - name: Download and Extract Payload
        if: env.found == 'true'
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
        run: |
          mkdir -p workspace
          echo "Evaluating Payload Type..."
          
          if [[ "$TARGET_LINK" == *drive.google.com* ]] || [[ "$TARGET_LINK" == *drive.usercontent.google.com* ]]; then
            echo "🌐 Detected Google Drive Link. Initializing Official API Engine..."
            
            cat << 'EOF' > gdrive_dl.py
          import os, sys, requests, re

          link = sys.argv[1]
          api_key = os.environ.get('GDRIVE_API_KEY')

          if not api_key:
              print("❌ CRITICAL ERROR: GDRIVE_API_KEY secret is missing!")
              print("You must generate a free Google Cloud API Key and add it to your GitHub Secrets.")
              sys.exit(1)

          match = re.search(r'(id=|/d/|folders/)([a-zA-Z0-9_-]+)', link)
          if not match:
              print("❌ Could not extract ID from link.")
              sys.exit(1)
          file_id = match.group(2)

          def download_file(fid, fname):
              print(f"⬇️ Downloading: {fname}...")
              url = f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media&acknowledgeAbuse=true&key={api_key}"
              with requests.get(url, stream=True) as r:
                  if r.status_code != 200:
                      print(f"❌ API Error: {r.text}")
                      sys.exit(1)
                  with open(os.path.join("workspace", fname), 'wb') as f:
                      for chunk in r.iter_content(chunk_size=1024*1024):
                          if chunk: f.write(chunk)
              print(f"✅ Download complete: {fname}")

          def process_node(fid):
              print(f"🔍 Inspecting Drive ID: {fid}...")
              url = f"https://www.googleapis.com/drive/v3/files/{fid}?fields=name,mimeType&key={api_key}"
              res = requests.get(url).json()
              if 'error' in res:
                  print(f"❌ API Error: {res['error']['message']}")
                  sys.exit(1)
              
              if res.get('mimeType') == 'application/vnd.google-apps.folder':
                  print(f"📂 Detected Folder: {res['name']}. Fetching contents...")
                  q_url = f"https://www.googleapis.com/drive/v3/files?q='{fid}'+in+parents&fields=files(id,name,mimeType)&key={api_key}"
                  files = requests.get(q_url).json().get('files', [])
                  for f in files:
                      if f['mimeType'] == 'application/vnd.google-apps.folder':
                          process_node(f['id'])
                      else:
                          download_file(f['id'], f['name'])
              else:
                  download_file(fid, res['name'])

          process_node(file_id)
          EOF
            
            python gdrive_dl.py "$TARGET_LINK"
            
          elif [[ "$TARGET_LINK" == http* ]]; then
            echo "📎 Detected HTTP Link. Fetching torrent file explicitly..."
            curl -s -L -o "workspace/payload.torrent" "$TARGET_LINK"
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 "workspace/payload.torrent" -d workspace/
            
          else
            echo "🧲 Detected Magnet Link. Fetching metadata natively..."
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 --bt-save-metadata=true "$TARGET_LINK" -d workspace/
          fi
          
          echo "📦 Scanning for ZIP archives..."
          while read -u 9 ZIP_FILE; do
            echo "Extracting archive: $ZIP_FILE"
            unzip -q -o "$ZIP_FILE" -d workspace/
            rm "$ZIP_FILE"
          done 9< <(find workspace -type f -name "*.zip")
          
          VIDEO_COUNT=$(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \) | wc -l)
          if [ "$VIDEO_COUNT" -eq 0 ]; then
             echo "❌ CRITICAL ERROR: Failed to locate any video files after download and extraction. Exiting."
             exit 1
          fi

      - name: Process Master Loop (Batch Parsing, FFmpeg, Metadata)
        if: env.found == 'true'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          mkdir -p hls_output
          
          while read -u 9 VIDEO_FILE; do
            echo "================================================================"
            echo "🎬 PROCESSING FILE: $VIDEO_FILE"
            BASENAME=$(basename "$VIDEO_FILE")
            
            # 1. DYNAMIC ROUTING & HIERARCHY SPLIT
            ROUTING=$(python -c "
          import sys, re
          from guessit import guessit
          
          filename = sys.argv[1]
          g = guessit(filename)
          
          vid_type = g.get('type')
          title = str(g.get('title', 'Unknown_Series')).title().replace(' ', '.')
          
          # Fix 2: Catch subtitles/arcs for Anime Movies (e.g. The Reze Arc)
          ep_title = str(g.get('episode_title', '')).title().replace(' ', '.')
          if ep_title and vid_type != 'episode':
              title = f'{title}.{ep_title}'
              
          title = re.sub(r'[^a-zA-Z0-9.\-]', '', title)
          
          year = str(g.get('year', ''))
          quality = str(g.get('screen_size', ''))
          s = g.get('season')
          e = g.get('episode')
          
          if not e:
              anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', filename)
              if anime_match:
                  e = anime_match.group(1)
                  vid_type = 'episode'
                  
          if vid_type == 'episode' or e:
              s_val = int(s[0] if isinstance(s, list) else s) if s else 1
              e_val = int(e[0] if isinstance(e, list) else e) if e else 1
              
              # Fix 1: Append Year and Quality to the Parent Show Folder
              base_dir = title
              if year: base_dir += f'.{year}'
              if quality: base_dir += f'.{quality}'
              
              print(f'{base_dir}|Season.{s_val:02d}/Episode.{e_val:02d}')
          else:
              clean_name = title
              if year: clean_name += f'.{year}'
              if quality: clean_name += f'.{quality}'
              print(f'{clean_name}|')
          " "$BASENAME")
            
            BASE_DIR=$(echo "$ROUTING" | cut -d'|' -f1)
            SUB_DIR=$(echo "$ROUTING" | cut -d'|' -f2)
            
            if [ -n "$SUB_DIR" ]; then
                TARGET_DIR="$BASE_DIR/$SUB_DIR"
            else
                TARGET_DIR="$BASE_DIR"
            fi
            
            # --- BASH COLLISION LOCK ---
            ORIG_TARGET_DIR="$TARGET_DIR"
            COUNTER=2
            while [ -d "hls_output/$TARGET_DIR" ] && [ "$(ls -A "hls_output/$TARGET_DIR" 2>/dev/null)" ]; do
              echo "⚠️ Collision detected! $TARGET_DIR already exists."
              TARGET_DIR="${ORIG_TARGET_DIR}_Part${COUNTER}"
              COUNTER=$((COUNTER+1))
            done
            
            echo "📁 Final Safe HF Directory: $TARGET_DIR"
            mkdir -p "hls_output/$TARGET_DIR"
            mkdir -p "hls_output/$BASE_DIR"
            
            # 2. FFMPEG TRANSCODING
            VIDEO_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
            if [[ "$VIDEO_CODEC" == "hevc" ]]; then
              V_TAG="-tag:v hvc1"
              M3U8_V_CODEC="hvc1.2.4.L153.B0"
            else
              V_TAG="-tag:v avc1"
              M3U8_V_CODEC="avc1.640028"
            fi

            STREAMS=$(ffprobe -v error -show_entries stream=index,codec_type:stream_tags=language,title -of csv=p=0 "$VIDEO_FILE" | tr '[:upper:]' '[:lower:]')
            AUDIO_MAPS="-map 0:V:0"
            VAR_STREAM_MAP="v:0,agroup:audio "
            AUDIO_ENCODING=""
            A_IDX=0
            LANG_REGEX="(^|[^a-z])(en|eng|english|hi|hin|hindi|te|tel|telugu)([^a-z]|$)"
            
            while IFS=',' read -r index ctype lang title; do
              if [[ "$ctype" == "audio" ]]; then
                if [[ "$lang $title" =~ $LANG_REGEX ]]; then
                  AUDIO_MAPS="$AUDIO_MAPS -map 0:$index"
                  VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und} "
                  CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  if [[ "$CODEC" =~ ^(ac3|eac3|dts|truehd)$ ]]; then
                    AUDIO_ENCODING+=" -c:a:$A_IDX libopus -b:a:$A_IDX 512k -filter:a:$A_IDX aformat=channel_layouts=7.1|5.1|stereo "
                  else
                    AUDIO_ENCODING+=" -c:a:$A_IDX copy "
                  fi
                  A_IDX=$((A_IDX + 1))
                fi
              fi
            done <<< "$STREAMS"
            
            if [[ "$A_IDX" -eq 0 ]]; then
              AUDIO_MAPS="$AUDIO_MAPS -map 0:a:0"
              VAR_STREAM_MAP="v:0,agroup:audio a:0,agroup:audio,language:und "
              CODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
              if [[ "$CODEC" =~ ^(ac3|eac3|dts|truehd)$ ]]; then
                AUDIO_ENCODING=" -c:a:0 libopus -b:a:0 512k -filter:a:0 aformat=channel_layouts=7.1|5.1|stereo "
              else
                AUDIO_ENCODING=" -c:a:0 copy "
              fi
            fi
            VAR_STREAM_MAP="${VAR_STREAM_MAP% }"
            
            if ! ffmpeg -nostdin -fflags +genpts -i "$VIDEO_FILE" \
              $AUDIO_MAPS -c:v copy $AUDIO_ENCODING $V_TAG \
              -max_muxing_queue_size 9999 -f hls -hls_segment_type fmp4 -hls_flags single_file \
              -hls_segment_filename "hls_output/$TARGET_DIR/stream_%v.m4s" \
              -var_stream_map "$VAR_STREAM_MAP" -master_pl_name master.m3u8 -hls_time 10 -hls_list_size 0 \
              "hls_output/$TARGET_DIR/stream_%v.m3u8"; then
              echo "❌ FFMPEG CRASHED ON $BASENAME! Skipping to next file..."
              continue
            fi
            
            if ! grep -q "stream_0.m3u8" "hls_output/$TARGET_DIR/master.m3u8"; then
              BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
              if [[ -z "$BITRATE" || "$BITRATE" == "N/A" ]]; then
                SIZE=$(stat -c %s "$VIDEO_FILE")
                DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
                BITRATE=$(awk "BEGIN {print int(($SIZE * 8) / $DURATION)}")
              fi
              BANDWIDTH=$(awk "BEGIN {print int($BITRATE * 1.1)}")
              RESOLUTION=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 "$VIDEO_FILE" 2>/dev/null)
              [ -z "$RESOLUTION" ] && RESOLUTION="1920x1080"
              printf '\n#EXT-X-STREAM-INF:BANDWIDTH=%s,RESOLUTION=%s,CODECS="%s,mp4a.40.2",AUDIO="group_audio"\nstream_0.m3u8\n' "$BANDWIDTH" "$RESOLUTION" "$M3U8_V_CODEC" >> "hls_output/$TARGET_DIR/master.m3u8"
            fi
              
            HAS_SUBS="false"
            echo "" >> "hls_output/$TARGET_DIR/master.m3u8"
            
            # --- PASS 1 & 2: SUBTITLE LOGIC (Remains Unchanged) ---
            while IFS=',' read -r index ctype lang title; do
              if [[ "$ctype" == "subtitle" ]]; then
                if [[ "$lang $title" =~ $LANG_REGEX ]]; then
                  SUB_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  if [[ "$SUB_CODEC" =~ ^(subrip|ass|webvtt)$ ]]; then
                    VTT_FILE="hls_output/$TARGET_DIR/subs_${index}_${lang:-und}.vtt"
                    if ffmpeg -nostdin -y -i "$VIDEO_FILE" -map "0:$index" "$VTT_FILE" >/dev/null 2>&1; then
                      if [ -s "$VTT_FILE" ]; then
                        HAS_SUBS="true"
                        CLEAN_NAME=$(echo "${title:-$lang}" | tr -cd 'a-zA-Z0-9 ()[]_-' | sed 's/^ *//;s/ *$//')
                        [ -z "$CLEAN_NAME" ] && CLEAN_NAME="Sub_${index}"
                        printf '#EXT-X-MEDIA:TYPE=SUBTITLES,GROUP-ID="group_subs",NAME="%s",LANGUAGE="%s",URI="%s"\n' "$CLEAN_NAME" "${lang:-und}" "subs_${index}_${lang:-und}.vtt" >> "hls_output/$TARGET_DIR/master.m3u8"
                      else
                        rm -f "$VTT_FILE"
                      fi
                    fi
                  fi
                fi
              fi
            done <<< "$STREAMS"
            
            if [[ "$HAS_SUBS" == "true" ]]; then
              sed -i '/RESOLUTION=/ s/AUDIO="group_audio"/AUDIO="group_audio",SUBTITLES="group_subs"/' "hls_output/$TARGET_DIR/master.m3u8"
            fi
            
            HF_BASE="https://huggingface.co/datasets/${{ secrets.HF_REPO }}/resolve/main/${TARGET_DIR}/"
            HF_BASE=$(python -c "import urllib.parse; print(urllib.parse.quote('$HF_BASE', safe=':/'))")
            find "hls_output/$TARGET_DIR" -name "*.m3u8" -exec sed -i -e "s|^[^#]|${HF_BASE}&|g" -e "s|URI=\"|URI=\"${HF_BASE}|g" {} +

            # 3. HIERARCHICAL METADATA GENERATOR
            python -c "
          import os, json, requests, subprocess, sys, re
          from guessit import guessit
          
          file_path = sys.argv[1]
          base_dir = sys.argv[2]
          sub_dir = sys.argv[3]
          filename = os.path.basename(file_path)
          
          target_dir = os.path.join(base_dir, sub_dir) if sub_dir else base_dir
          g = guessit(filename)
          
          title = g.get('title', 'Unknown Title')
          year = str(g.get('year', ''))
          quality = g.get('screen_size', '')

          size_bytes = os.path.getsize(file_path)
          size_str = f'{round(size_bytes / (1024**3), 2)} GB'

          duration_formatted = '0m'
          try:
              cmd = ['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
              res = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              dur = float(res.stdout.strip())
              h, m = int(dur // 3600), int((dur % 3600) // 60)
              duration_formatted = f'{h}h{m}m' if h > 0 else f'{m}m'
          except: pass

          hf_repo = os.environ.get('HF_REPO', '')
          import urllib.parse
          safe_target_dir = urllib.parse.quote(target_dir)
          manifest_url = f'https://huggingface.co/datasets/{hf_repo}/resolve/main/{safe_target_dir}/master.m3u8'

          tmdb_key = os.environ.get('TMDB_API_KEY')
          
          if sub_dir:
              # --- IT'S A TV EPISODE ---
              ep_match = re.search(r'Episode\.(\d+)', sub_dir)
              ep_num = ep_match.group(1) if ep_match else '01'
              
              # 1. Write Lean Episode Metadata
              ep_meta = {
                  'original_filename': filename,
                  'title': f'Episode {ep_num}',
                  'quality': quality,
                  'duration': duration_formatted,
                  'size': size_str,
                  'hls_manifest_url': manifest_url
              }
              with open(f'hls_output/{target_dir}/metadata.json', 'w') as f:
                  json.dump(ep_meta, f, indent=4)
                  
              # 2. Write Rich Show Metadata (Only if it doesn't exist yet)
              show_meta_path = f'hls_output/{base_dir}/metadata.json'
              if not os.path.exists(show_meta_path):
                  show_meta = {
                      'id': 0, 'title': title, 'year': year, 'rating': 0.0,
                      'poster_url': '', 'backdrop_url': '', 'overview': ''
                  }
                  if tmdb_key and title != 'Unknown Title':
                      search_url = f'https://api.themoviedb.org/3/search/tv?api_key={tmdb_key}&query={title}'
                      try:
                          res = requests.get(search_url).json()
                          if res.get('results'):
                              match = res['results'][0]
                              show_meta['id'] = match.get('id', 0)
                              show_meta['title'] = match.get('name', title)
                              if not show_meta['year']: show_meta['year'] = match.get('first_air_date', '')[:4]
                              show_meta['overview'] = match.get('overview', '')
                              show_meta['rating'] = round(match.get('vote_average', 0.0), 1)
                              if match.get('poster_path'): show_meta['poster_url'] = f'https://image.tmdb.org/t/p/w600_and_h900_bestv2{match.get(\"poster_path\")}'
                              if match.get('backdrop_path'): show_meta['backdrop_url'] = f'https://image.tmdb.org/t/p/w1920_and_h800_multi_faces{match.get(\"backdrop_path\")}'
                      except: pass
                  with open(show_meta_path, 'w') as f:
                      json.dump(show_meta, f, indent=4)
                      
          else:
              # --- IT'S A MOVIE ---
              movie_meta = {
                  'id': 0, 'original_filename': filename, 'title': title,
                  'year': year, 'quality': quality, 'duration': duration_formatted,
                  'size': size_str, 'rating': 0.0, 'poster_url': '',
                  'backdrop_url': '', 'hls_manifest_url': manifest_url, 'overview': ''
              }
              if tmdb_key and title != 'Unknown Title':
                  search_url = f'https://api.themoviedb.org/3/search/movie?api_key={tmdb_key}&query={title}'
                  if year: search_url += f'&year={year}'
                  try:
                      res = requests.get(search_url).json()
                      if res.get('results'):
                          match = res['results'][0]
                          movie_meta['id'] = match.get('id', 0)
                          movie_meta['title'] = match.get('title', title)
                          if not movie_meta['year']: movie_meta['year'] = match.get('release_date', '')[:4]
                          movie_meta['overview'] = match.get('overview', '')
                          movie_meta['rating'] = round(match.get('vote_average', 0.0), 1)
                          if match.get('poster_path'): movie_meta['poster_url'] = f'https://image.tmdb.org/t/p/w600_and_h900_bestv2{match.get(\"poster_path\")}'
                          if match.get('backdrop_path'): movie_meta['backdrop_url'] = f'https://image.tmdb.org/t/p/w1920_and_h800_multi_faces{match.get(\"backdrop_path\")}'
                  except: pass
              with open(f'hls_output/{target_dir}/metadata.json', 'w') as f:
                  json.dump(movie_meta, f, indent=4)
          " "$VIDEO_FILE" "$BASE_DIR" "$SUB_DIR"

          done 9< <(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \))
          
          if [ ! -d "hls_output" ] || [ -z "$(ls -A hls_output)" ]; then
            echo "❌ CRITICAL ERROR: hls_output is empty. Processing failed."
            exit 1
          fi

      - name: Upload Output to Hugging Face
        if: env.found == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          api.upload_folder(
              folder_path='hls_output',
              path_in_repo='',
              repo_id=os.environ.get('HF_REPO'),
              repo_type='dataset',
              token=os.environ.get('HF_TOKEN')
          )
          "

      - name: Report Success to Discord
        if: env.found == 'true' && success()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          QUEUE_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          TOTAL_FILES=$(find hls_output -name "metadata.json" | wc -l)
          TOTAL_SIZE=$(du -sh hls_output | cut -f1)
          
          STATUS_MSG="✅ **Batch Upload Complete!** \n🎬 Processed: \`${TOTAL_FILES} video(s)\`\n📦 Total Size: \`${TOTAL_SIZE}\`\n🌐 CDN Ready on HuggingFace."
          
          ./discord_manager "$DISCORD_TOKEN" "$QUEUE_CHANNEL_ID" delete "$MSG_ID"
          ./discord_manager "$DISCORD_TOKEN" "$PING_CHANNEL_ID" send "$STATUS_MSG"

      - name: Report Failure to Discord
        if: env.found == 'true' && failure()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          FAIL_MSG="❌ **Pipeline Failed!** \n🚨 The Torrent/Drive-to-HLS job crashed during execution.\n🔗 [View Action Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          PAYLOAD=$(jq -n --arg content "$FAIL_MSG" '{content: $content}')
          
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" \
               -H "Content-Type: application/json" \
               -H "User-Agent: DiscordBot (https://github.com, 1.0)" \
               -X POST \
               -d "$PAYLOAD" \
               "https://discord.com/api/v10/channels/$PING_CHANNEL_ID/messages"
