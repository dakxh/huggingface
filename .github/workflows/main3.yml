name: exp

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg aria2 libcurl4-openssl-dev
          pip install huggingface_hub guessit requests

      - name: Compile and Fetch from Discord
        id: discord_fetch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          g++ discord_manager.cpp -o discord_manager -lcurl
          
          OUTPUT=$(./discord_manager "$DISCORD_TOKEN" "$CHANNEL_ID" fetch)
          MSG_ID=$(echo "$OUTPUT" | cut -d'|' -f1)
          TARGET_LINK=$(echo "$OUTPUT" | cut -d'|' -f2-)
          
          if [ -z "$TARGET_LINK" ] || [ "$MSG_ID" == "empty" ] || [ "$MSG_ID" == "error" ]; then
            echo "❌ API Error or No valid magnet/torrent found."
            echo "API Trace: $TARGET_LINK"
            echo "found=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "Target acquired: $TARGET_LINK"
          # Temporary fallback name for the queue
          VIDEO_NAME="Queue_$(date +%s)"
          
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV
          echo "TARGET_LINK=$TARGET_LINK" >> $GITHUB_ENV
          echo "VIDEO_NAME=$VIDEO_NAME" >> $GITHUB_ENV
          echo "found=true" >> $GITHUB_ENV

      - name: Download Torrent or Magnet
        if: env.found == 'true'
        run: |
          mkdir -p workspace
          echo "Downloading payload..."
          
          if [[ "$TARGET_LINK" == http* ]]; then
            echo "Detected HTTP Link (Discord Attachment). Fetching explicitly..."
            curl -s -L -o "workspace/payload.torrent" "$TARGET_LINK"
            aria2c --seed-time=0 "workspace/payload.torrent" -d workspace/
          else
            echo "Detected Magnet Link. Fetching metadata natively..."
            aria2c --seed-time=0 --bt-save-metadata=true "$TARGET_LINK" -d workspace/
          fi
          
          VIDEO_FILE=$(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \) -exec basename {} \; | sort -nr | head -n 1)
          if [ -z "$VIDEO_FILE" ]; then
             echo "❌ CRITICAL ERROR: aria2c failed to download the video payload. Exiting."
             exit 1
          fi

      - name: Parse Clean Video Name
        if: env.found == 'true'
        run: |
          echo "Running Python GuessIt to extract clean scene metadata..."
          python -c "
          import os, glob, re
          from guessit import guessit

          video_files = glob.glob('workspace/**/*.mkv', recursive=True) + glob.glob('workspace/**/*.mp4', recursive=True)
          if not video_files:
              print('❌ No video file found.')
              exit(1)

          file_path = max(video_files, key=os.path.getsize)
          filename = os.path.basename(file_path)

          g = guessit(filename)
          title = g.get('title', 'Unknown')
          year = g.get('year', '')
          quality = g.get('screen_size', '')

          clean_name = str(title).replace(' ', '.')
          if year:
              clean_name += f'.{year}'
          if quality:
              clean_name += f'.{quality}'

          clean_name = re.sub(r'[^a-zA-Z0-9.\-]', '', clean_name)
          
          print(f'Original filename: {filename}')
          print(f'Parsed clean name: {clean_name}')
          
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'VIDEO_NAME={clean_name}\n')
          "

      - name: Process Video, Audio, and Subs into HLS
        if: env.found == 'true'
        run: |
          mkdir -p hls_output
          
          VIDEO_FILE=$(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \) -exec stat -c "%s %n" {} + | sort -nr | head -n 1 | cut -d' ' -f2-)
          echo "Processing $VIDEO_FILE..."
          
          VIDEO_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          
          if [[ "$VIDEO_CODEC" == "hevc" ]]; then
            V_TAG="-tag:v hvc1"
            M3U8_V_CODEC="hvc1.2.4.L153.B0"
          else
            V_TAG="-tag:v avc1"
            M3U8_V_CODEC="avc1.640028"
          fi

          STREAMS=$(ffprobe -v error -show_entries stream=index,codec_type:stream_tags=language,title -of csv=p=0 "$VIDEO_FILE" | tr '[:upper:]' '[:lower:]')
          AUDIO_MAPS="-map 0:V:0"
          VAR_STREAM_MAP="v:0,agroup:audio "
          AUDIO_ENCODING=""
          A_IDX=0
          LANG_REGEX="(^|[^a-z])(en|eng|english|hi|hin|hindi|te|tel|telugu)([^a-z]|$)"
          
          while IFS=',' read -r index ctype lang title; do
            if [[ "$ctype" == "audio" ]]; then
              if [[ "$lang $title" =~ $LANG_REGEX ]]; then
                AUDIO_MAPS="$AUDIO_MAPS -map 0:$index"
                VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und} "
                
                CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                
                if [[ "$CODEC" =~ ^(ac3|eac3|dts|truehd)$ ]]; then
                  AUDIO_ENCODING+=" -c:a:$A_IDX libopus -b:a:$A_IDX 512k -filter:a:$A_IDX aformat=channel_layouts=7.1|5.1|stereo "
                else
                  AUDIO_ENCODING+=" -c:a:$A_IDX copy "
                fi
                A_IDX=$((A_IDX + 1))
              fi
            fi
          done <<< "$STREAMS"
          
          if [[ "$A_IDX" -eq 0 ]]; then
            AUDIO_MAPS="$AUDIO_MAPS -map 0:a:0"
            VAR_STREAM_MAP="v:0,agroup:audio a:0,agroup:audio,language:und "
            CODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
            if [[ "$CODEC" =~ ^(ac3|eac3|dts|truehd)$ ]]; then
              AUDIO_ENCODING=" -c:a:0 libopus -b:a:0 512k -filter:a:0 aformat=channel_layouts=7.1|5.1|stereo "
            else
              AUDIO_ENCODING=" -c:a:0 copy "
            fi
          fi
          
          VAR_STREAM_MAP="${VAR_STREAM_MAP% }"
          export FFREPORT="file=ffmpeg_native_crash.log:level=32"
          
          if ! ffmpeg -fflags +genpts -i "$VIDEO_FILE" \
            $AUDIO_MAPS \
            -c:v copy $AUDIO_ENCODING \
            $V_TAG \
            -max_muxing_queue_size 9999 \
            -f hls \
            -hls_segment_type fmp4 \
            -hls_flags single_file \
            -var_stream_map "$VAR_STREAM_MAP" \
            -master_pl_name master.m3u8 \
            -hls_time 10 \
            -hls_list_size 0 \
            hls_output/stream_%v.m3u8; then
            cat ffmpeg_native_crash.log
            exit 1
          fi
          
          if ! grep -q "stream_0.m3u8" hls_output/master.m3u8; then
            BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
            if [[ -z "$BITRATE" || "$BITRATE" == "N/A" ]]; then
              SIZE=$(stat -c %s "$VIDEO_FILE")
              DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
              BITRATE=$(awk "BEGIN {print int(($SIZE * 8) / $DURATION)}")
            fi
            BANDWIDTH=$(awk "BEGIN {print int($BITRATE * 1.1)}")
            RESOLUTION=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 "$VIDEO_FILE" 2>/dev/null)
            [ -z "$RESOLUTION" ] && RESOLUTION="1920x1080"
            printf '\n#EXT-X-STREAM-INF:BANDWIDTH=%s,RESOLUTION=%s,CODECS="%s,mp4a.40.2",AUDIO="group_audio"\nstream_0.m3u8\n' "$BANDWIDTH" "$RESOLUTION" "$M3U8_V_CODEC" >> hls_output/master.m3u8
          fi
            
          HAS_SUBS="false"
          echo "" >> hls_output/master.m3u8
          
          while IFS=',' read -r index ctype lang title; do
            if [[ "$ctype" == "subtitle" ]]; then
              if [[ "$lang $title" =~ $LANG_REGEX ]]; then
                VTT_FILE="hls_output/subs_${index}_${lang:-und}.vtt"
                if ffmpeg -y -i "$VIDEO_FILE" -map "0:$index" "$VTT_FILE" >/dev/null 2>&1; then
                  if [ -s "$VTT_FILE" ]; then
                    HAS_SUBS="true"
                    CLEAN_NAME=$(echo "${title:-$lang}" | tr -cd 'a-zA-Z0-9 ()[]_-' | sed 's/^ *//;s/ *$//')
                    [ -z "$CLEAN_NAME" ] && CLEAN_NAME="Sub_${index}"
                    printf '#EXT-X-MEDIA:TYPE=SUBTITLES,GROUP-ID="group_subs",NAME="%s",LANGUAGE="%s",URI="%s"\n' "$CLEAN_NAME" "${lang:-und}" "subs_${index}_${lang:-und}.vtt" >> hls_output/master.m3u8
                  else
                    rm -f "$VTT_FILE"
                  fi
                fi
              fi
            fi
          done <<< "$STREAMS"
          
          if [[ "$HAS_SUBS" == "true" ]]; then
            sed -i '/RESOLUTION=/ s/AUDIO="group_audio"/AUDIO="group_audio",SUBTITLES="group_subs"/' hls_output/master.m3u8
          fi
          
          HF_BASE="https://huggingface.co/datasets/${{ secrets.HF_REPO }}/resolve/main/${VIDEO_NAME}/"
          find hls_output -name "*.m3u8" -exec sed -i -e "s|^[^#]|${HF_BASE}&|g" -e "s|URI=\"|URI=\"${HF_BASE}|g" {} +

      - name: Generate Rich Metadata JSON
        if: env.found == 'true'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          python -c "
          import os, json, requests, subprocess, glob
          from guessit import guessit

          print('Extracting actual video file stats...')
          
          video_files = glob.glob('workspace/**/*.mkv', recursive=True) + glob.glob('workspace/**/*.mp4', recursive=True)
          if not video_files:
              print('❌ No video file found for metadata extraction.')
              exit(1)
              
          file_path = max(video_files, key=os.path.getsize)
          filename = os.path.basename(file_path)

          g = guessit(filename)
          title = g.get('title', 'Unknown Title')
          year = g.get('year', '')
          quality = g.get('screen_size', 'Unknown Quality')

          size_bytes = os.path.getsize(file_path)
          size_gb = round(size_bytes / (1024**3), 2)
          size_str = f'{size_gb} GB'

          duration_formatted = '0m'
          try:
              cmd = ['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
              result = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              dur_seconds = float(result.stdout.strip())
              
              hours = int(dur_seconds // 3600)
              minutes = int((dur_seconds % 3600) // 60)
              
              if hours > 0:
                  duration_formatted = f'{hours}h{minutes}m'
              else:
                  duration_formatted = f'{minutes}m'
          except Exception as e:
              print('Failed to get duration:', e)

          hf_repo = os.environ.get('HF_REPO', '')
          video_name = os.environ.get('VIDEO_NAME', '')
          hf_base_url = f'https://huggingface.co/datasets/{hf_repo}/resolve/main/{video_name}/'

          metadata = {
              'id': 0,
              'original_filename': filename,
              'title': title,
              'year': str(year) if year else '',
              'quality': quality,
              'duration': duration_formatted,
              'size': size_str,
              'rating': 0.0,
              'poster_url': '',
              'backdrop_url': '',
              'hls_manifest_url': f'{hf_base_url}master.m3u8',
              'overview': ''
          }

          tmdb_key = os.environ.get('TMDB_API_KEY')
          if tmdb_key and title != 'Unknown Title':
              m_type = 'tv' if 'season' in g or 'episode' in g else 'movie'
              
              search_url = f'https://api.themoviedb.org/3/search/{m_type}?api_key={tmdb_key}&query={title}'
              if year:
                  search_url += f'&year={year}' if m_type == 'movie' else f'&first_air_date_year={year}'
              
              try:
                  res = requests.get(search_url).json()
                  if res.get('results') and len(res['results']) > 0:
                      best_match = res['results'][0]
                      
                      metadata['id'] = best_match.get('id', 0)
                      metadata['title'] = best_match.get('title') or best_match.get('name') or title
                      metadata['overview'] = best_match.get('overview', '')
                      metadata['rating'] = round(best_match.get('vote_average', 0.0), 1)
                      
                      if best_match.get('poster_path'):
                          metadata['poster_url'] = f'https://image.tmdb.org/t/p/w600_and_h900_bestv2{best_match.get(\"poster_path\")}'
                      if best_match.get('backdrop_path'):
                          metadata['backdrop_url'] = f'https://image.tmdb.org/t/p/w1920_and_h800_multi_faces{best_match.get(\"backdrop_path\")}'
              except Exception as e:
                  print('TMDB API fetch failed:', e)

          os.makedirs('hls_output', exist_ok=True)
          with open('hls_output/metadata.json', 'w') as f:
              json.dump(metadata, f, indent=4)
          
          print('✅ Rich Metadata successfully generated and saved.')
          "

      - name: Upload Output to Hugging Face
        if: env.found == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          api.upload_folder(
              folder_path='hls_output',
              path_in_repo=os.environ.get('VIDEO_NAME'),
              repo_id=os.environ.get('HF_REPO'),
              repo_type='dataset',
              token=os.environ.get('HF_TOKEN')
          )
          "

      - name: Report Success to Discord
        if: env.found == 'true' && success()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          QUEUE_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          CLEAN_TITLE=$(python -c "import json; print(json.load(open('hls_output/metadata.json')).get('title', 'Unknown'))" 2>/dev/null || echo "Unknown")
          TOTAL_SIZE=$(du -sh hls_output | cut -f1)
          
          STATUS_MSG="✅ **Upload Complete!** \n🎬 Title: \`${CLEAN_TITLE}\`\n📦 Size: \`${TOTAL_SIZE}\`\n🌐 CDN Ready on HuggingFace."
          
          echo "Cleaning up queue..."
          ./discord_manager "$DISCORD_TOKEN" "$QUEUE_CHANNEL_ID" delete "$MSG_ID"
          
          echo "Sending ping to log channel..."
          ./discord_manager "$DISCORD_TOKEN" "$PING_CHANNEL_ID" send "$STATUS_MSG"
