name: Discord Torrent to HLS Pipeline (bucket edition)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg aria2 libcurl4-openssl-dev jq unzip
          
          # Added PEP 668 breakout to ensure OS pipelines do not break on huggingface pip installs
          pip install -U --break-system-packages "huggingface_hub[cli]" guessit requests google-auth

      - name: Compile and Fetch from Discord
        id: discord_fetch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          g++ discord_manager.cpp -o discord_manager -lcurl
          
          OUTPUT=$(./discord_manager "$DISCORD_TOKEN" "$CHANNEL_ID" fetch)
          MSG_ID=$(echo "$OUTPUT" | cut -d'|' -f1)
          TARGET_LINK=$(echo "$OUTPUT" | cut -d'|' -f2-)
          
          if [ -z "$TARGET_LINK" ] || [ "$MSG_ID" == "empty" ] || [ "$MSG_ID" == "error" ]; then
            echo "❌ API Error or No valid link found."
            echo "found=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "Target acquired: $TARGET_LINK"
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV
          echo "TARGET_LINK=$TARGET_LINK" >> $GITHUB_ENV
          echo "found=true" >> $GITHUB_ENV

      - name: Download and Extract Payload
        if: env.found == 'true'
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          mkdir -p workspace
          echo "Evaluating Payload Type..."
          
          if [[ "$TARGET_LINK" == *drive.google.com* ]] || [[ "$TARGET_LINK" == *drive.usercontent.google.com* ]]; then
            
            # --- THE IDM WORKAROUND: Pre-Authenticated Direct Links ---
            if [[ "$TARGET_LINK" == *\&at=* ]] || [[ "$TARGET_LINK" == *confirm=t* ]]; then
              echo "🚀 Detected Pre-Authenticated Direct Drive Link. Bypassing APIs and fetching natively..."
              cd workspace
              curl -# -L -OJ "$TARGET_LINK"
              cd ..
            else
            # --- ENTERPRISE SA DOWNLOADER ---
              echo "🌐 Detected Standard Google Drive Link. Initializing Lightning SA Downloader..."
              
              cat << 'EOF' > gdrive_sa_dl.py
          import os, sys, re, json
          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          link = sys.argv[1]
          sa_json_str = os.environ.get('GCP_SA_JSON')

          if not sa_json_str:
              print("❌ CRITICAL ERROR: GCP_SA_JSON secret is missing.")
              sys.exit(1)

          try:
              sa_info = json.loads(sa_json_str)
              creds = service_account.Credentials.from_service_account_info(sa_info, scopes=['https://www.googleapis.com/auth/drive.readonly'])
              creds.refresh(Request())
              headers = {'Authorization': f'Bearer {creds.token}'}
          except Exception as e:
              print(f"❌ Authentication Failed: {e}")
              sys.exit(1)

          match = re.search(r'(id=|/d/|folders/)([a-zA-Z0-9_-]+)', link)
          if not match:
              print("❌ Could not extract ID from link.")
              sys.exit(1)
          file_id = match.group(2)

          def download_file(fid, fname):
              print(f"⬇️ Authenticated SA Download started for: {fname}")
              try:
                  url = f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media"
                  with requests.get(url, headers=headers, stream=True) as r:
                      r.raise_for_status()
                      with open(os.path.join("workspace", fname), 'wb') as f:
                          for chunk in r.iter_content(chunk_size=1024*1024*10):
                              if chunk: f.write(chunk)
                  print(f"✅ Download complete: {fname}")
              except Exception as e:
                  print(f"\n❌ Download Failed: {e}")
                  sys.exit(1)

          def process_node(fid):
              print(f"🔍 Inspecting Drive ID: {fid}")
              try:
                  url = f"https://www.googleapis.com/drive/v3/files/{fid}?fields=name,mimeType"
                  res = requests.get(url, headers=headers).json()
                  if 'error' in res: raise Exception(res['error']['message'])
              except Exception as e:
                  print(f"❌ API Error: {e}"); sys.exit(1)

              if res.get('mimeType') == 'application/vnd.google-apps.folder':
                  q_url = f"https://www.googleapis.com/drive/v3/files?q='{fid}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)"
                  children = requests.get(q_url, headers=headers).json().get('files', [])
                  for child in children:
                      if child['mimeType'] == 'application/vnd.google-apps.folder': process_node(child['id'])
                      else: download_file(child['id'], child['name'])
              else: download_file(fid, res['name'])

          process_node(file_id)
          EOF
              
              python gdrive_sa_dl.py "$TARGET_LINK"
            fi
            
          elif [[ "$TARGET_LINK" == http* ]]; then
            echo "📎 Detected HTTP Link. Fetching torrent file explicitly..."
            curl -s -L -o "workspace/payload.torrent" "$TARGET_LINK"
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 "workspace/payload.torrent" -d workspace/
          else
            echo "🧲 Detected Magnet Link. Fetching metadata natively..."
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 --bt-save-metadata=true "$TARGET_LINK" -d workspace/
          fi
          
          echo "📦 Scanning for ZIP archives..."
          while read -u 9 ZIP_FILE; do
            unzip -q -o "$ZIP_FILE" -d workspace/
            rm "$ZIP_FILE"
          done 9< <(find workspace -type f -name "*.zip")
          
          VIDEO_COUNT=$(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \) | wc -l)
          if [ "$VIDEO_COUNT" -eq 0 ]; then
             echo "❌ CRITICAL ERROR: Failed to locate any video files. Exiting."
             exit 1
          fi

      - name: Generate Python Helper Scripts
        if: env.found == 'true'
        run: |
          cat << 'EOF' > routing.py
          import os, sys, re, subprocess
          from guessit import guessit
          
          file_path = sys.argv[1]
          filename = os.path.basename(file_path)
          g = guessit(filename)
          
          vid_type = g.get('type')
          title = str(g.get('title', '')).strip()
          
          year_matches = list(re.finditer(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', filename))
          if year_matches:
              last_year_match = year_matches[-1]
              raw_prefix = filename[:last_year_match.start()]
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title): title = regex_title
              year = last_year_match.group(1)
          else: year = str(g.get('year', ''))
                  
          if not title: title = 'Unknown_Title'
          title = title.title().replace(' ', '.')
          
          quality_raw = str(g.get('screen_size', '')).lower()
          if '4k' in quality_raw or '2160' in quality_raw or '3840' in quality_raw:
              resolution = '2160p'
          elif '720' in quality_raw or '1280' in quality_raw:
              resolution = '720p'
          else:
              # Defaults 1920x1080, 1920x800, 1920x960, and anything unknown to 1080p
              resolution = '1080p'

          is_hdr = bool(re.search(r'(hdr|dovi|\bdv\b)', filename.lower()))
          dynamic_range = 'HDR' if is_hdr else 'SDR'

          is_imax = 'imax' in filename.lower()
          if not is_imax:
              try:
                  cmd =['ffprobe', '-v', 'error', '-select_streams', 'v:0', '-show_entries', 'stream=width,height', '-of', 'csv=s=x:p=0', file_path]
                  res = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
                  w, h = map(float, res.stdout.strip().split('x'))
                  ar = w / h
                  if (1.40 <= ar <= 1.45) or (1.85 <= ar <= 1.95): is_imax = True
              except: pass
              
          imax_tag = '.IMAX' if is_imax else ''
          variation_str = f"{resolution}{imax_tag}.{dynamic_range}"

          s, e = g.get('season'), g.get('episode')
          if not s:
              s_match = re.search(r'[Ss](\d{1,2})[Ee]\d', filename)
              if s_match: s = int(s_match.group(1))
              else:
                  s_path_match = re.search(r'[Ss]eason\s?0*(\d{1,2})', file_path, re.IGNORECASE)
                  if s_path_match: s = int(s_path_match.group(1))

          if not e:
              anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', filename)
              if anime_match: e = anime_match.group(1); vid_type = 'episode'

          ep_title = str(g.get('episode_title', '')).title().replace(' ', '.')
          if ep_title and vid_type != 'episode': title = f'{title}.{ep_title}'
          title = re.sub(r'[^a-zA-Z0-9.\-]', '', title)
                  
          if vid_type == 'episode' or e:
              s_val = int(s[0] if isinstance(s, list) else s) if s else 1
              e_val = int(e[0] if isinstance(e, list) else e) if e else 1
              base_dir = f"{title}.{year}" if year else title
              print(f'{base_dir}|Season.{s_val:02d}/Episode.{e_val:02d}|{is_imax}|{is_hdr}|{variation_str}|{resolution}')
          else:
              base_dir = f"{title}.{year}.{variation_str}" if year else f"{title}.{variation_str}"
              print(f'{base_dir}||{is_imax}|{is_hdr}|{variation_str}|{resolution}')
          EOF

          cat << 'EOF' > metadata_builder.py
          import os, json, requests, subprocess, sys, re, time, urllib.parse
          from guessit import guessit
          
          file_path, base_dir, sub_dir, audio_str, subs_str, is_imax_str, is_hdr_str, variation_str, resolution_str = sys.argv[1:10]
          is_imax, is_hdr = is_imax_str.lower() == 'true', is_hdr_str.lower() == 'true'
          available_audio = list(set([x.strip() for x in audio_str.split() if x.strip()]))
          available_subs = list(set([x.strip() for x in subs_str.split() if x.strip()]))
          date_added = int(time.time())
          
          filename = os.path.basename(file_path)
          target_dir = os.path.join(base_dir, sub_dir) if sub_dir else base_dir
          g = guessit(filename)
          title = str(g.get('title', '')).strip()
          
          year_matches = list(re.finditer(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', filename))
          if year_matches:
              last_year_match = year_matches[-1]
              raw_prefix = filename[:last_year_match.start()]
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title): title = regex_title
              year = last_year_match.group(1)
          else: year = str(g.get('year', ''))
          if not title: title = 'Unknown Title'

          dur_seconds = 0.0
          try:
              cmd =['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
              res = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              dur_seconds = float(res.stdout.strip())
          except: pass

          def format_dur(secs):
              h, m = int(secs // 3600), int((secs % 3600) // 60)
              return f'{h}h{m}m' if h > 0 else f'{m}m'
              
          duration_formatted = format_dur(dur_seconds)
          size_bytes = os.path.getsize(file_path)
          size_str = f'{round(size_bytes / (1024**3), 2)} GB'

          # ⚡ URL UPDATE FOR BUCKETS ⚡
          hf_bucket = os.environ.get('HF_BUCKET', '')
          safe_target_dir = urllib.parse.quote(target_dir)
          manifest_url = f'https://huggingface.co/buckets/{hf_bucket}/{safe_target_dir}/master.m3u8'
          tmdb_key = os.environ.get('TMDB_API_KEY')
          
          catalog_path = 'hls_output/session_catalog.json'
          try:
              with open(catalog_path, 'r') as f: catalog = json.load(f)
          except: catalog =[]
              
          if sub_dir:
              # ====== TV SHOW ======
              s_val, e_val = g.get('season'), g.get('episode')
              if not s_val:
                  s_match = re.search(r'[Ss](\d{1,2})[Ee]\d', filename)
                  if s_match: s_val = int(s_match.group(1))
              if not e_val:
                  anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', filename)
                  if anime_match: e_val = int(anime_match.group(1))
              
              season_num = int(s_val[0] if isinstance(s_val, list) else s_val) if s_val else 1
              episode_num = int(e_val[0] if isinstance(e_val, list) else e_val) if e_val else 1
              
              show_meta_path = f'hls_output/{base_dir}/metadata.json'
              show_meta = {'id': 0, 'type': 'series', 'title': title, 'year': year, 'rating': 0.0, 'quality': resolution_str, 'duration': '0m', 'IMAX': is_imax, 'HDR': is_hdr, 'poster_url': '', 'backdrop_url': '', 'overview': '', 'date_added': date_added, '_total_secs': 0.0, '_ep_count': 0, 'episodes':[]}
              
              if os.path.exists(show_meta_path):
                  try:
                      with open(show_meta_path, 'r') as f: show_meta.update(json.load(f)); show_meta['date_added'] = date_added
                  except: pass
                  
              show_meta['_total_secs'] += dur_seconds
              show_meta['_ep_count'] += 1
              show_meta['duration'] = format_dur(show_meta['_total_secs'] / show_meta['_ep_count'])
              show_meta['quality'] = resolution_str
              if is_imax: show_meta['IMAX'] = True
              if is_hdr: show_meta['HDR'] = True
                  
              if tmdb_key and title != 'Unknown Title' and show_meta['id'] == 0:
                  try:
                      res = requests.get(f'https://api.themoviedb.org/3/search/tv?api_key={tmdb_key}&query={title}').json()
                      if res.get('results'):
                          match = res['results'][0]
                          show_meta['id'] = match.get('id', 0)
                          show_meta['title'] = match.get('name', title)
                          if not show_meta['year']: show_meta['year'] = match.get('first_air_date', '')[:4]
                          show_meta['overview'] = match.get('overview', '')
                          show_meta['rating'] = round(match.get('vote_average', 0.0), 1)
                          if match.get('poster_path'): show_meta['poster_url'] = f"https://image.tmdb.org/t/p/w600_and_h900_bestv2{match.get('poster_path')}"
                  except: pass
                  
              episode_name = f'Episode {episode_num}'
              if tmdb_key and show_meta['id'] != 0:
                  try:
                      ep_res = requests.get(f'https://api.themoviedb.org/3/tv/{show_meta["id"]}/season/{season_num}/episode/{episode_num}?api_key={tmdb_key}').json()
                      if ep_res.get('name'): episode_name = ep_res['name']
                  except: pass
              
              show_meta['episodes'] =[ep for ep in show_meta['episodes'] if not (ep['season_number'] == season_num and ep['episode_number'] == episode_num)]
              show_meta['episodes'].append({'season_number': season_num, 'episode_number': episode_num, 'episode_name': episode_name, 'quality': resolution_str, 'date_added': date_added, 'hls_manifest_url': manifest_url})
              show_meta['episodes'] = sorted(show_meta['episodes'], key=lambda x: (x['season_number'], x['episode_number']))
              
              with open(show_meta_path, 'w') as f: json.dump(show_meta, f, indent=4)
                  
              ep_meta = {'id': show_meta['id'], 'series_title': title, 'season_number': season_num, 'episode_number': episode_num, 'episode_name': episode_name, 'original_filename': filename, 'quality': resolution_str, 'duration': duration_formatted, 'size': size_str, 'available_audio': available_audio, 'available_subs': available_subs, 'date_added': date_added, 'hls_manifest_url': manifest_url}
              with open(f'hls_output/{target_dir}/metadata.json', 'w') as f: json.dump(ep_meta, f, indent=4)
                  
              series_metadata_url = f"https://huggingface.co/buckets/{hf_bucket}/{urllib.parse.quote(base_dir)}/metadata.json"
              catalog =[item for item in catalog if item.get('type') != 'episode']
              catalog =[item for item in catalog if not (item.get('type') == 'series' and item.get('title') == show_meta['title'])]
              
              catalog.append({'id': show_meta['id'], 'type': 'series', 'title': show_meta['title'], 'year': show_meta['year'], 'quality': resolution_str, 'date_added': date_added, 'series_metadata_url': series_metadata_url, 'poster_url': show_meta.get('poster_url', '')})
                      
          else:
              # ====== MOVIE ======
              movie_meta = {'id': 0, 'type': 'movie', 'original_filename': filename, 'title': title, 'year': year, 'rating': 0.0, 'quality': resolution_str, 'duration': duration_formatted, 'IMAX': is_imax, 'HDR': is_hdr, 'poster_url': '', 'backdrop_url': '', 'hls_manifest_url': manifest_url, 'overview': '', 'available_audio': available_audio, 'available_subs': available_subs, 'date_added': date_added}
              
              if tmdb_key and title != 'Unknown Title':
                  search_url = f'https://api.themoviedb.org/3/search/movie?api_key={tmdb_key}&query={title}'
                  if year: search_url += f'&year={year}'
                  try:
                      res = requests.get(search_url).json()
                      if res.get('results'):
                          match = res['results'][0]
                          movie_meta['id'], movie_meta['title'], movie_meta['overview'], movie_meta['rating'] = match.get('id', 0), match.get('title', title), match.get('overview', ''), round(match.get('vote_average', 0.0), 1)
                          if not movie_meta['year']: movie_meta['year'] = match.get('release_date', '')[:4]
                          if match.get('poster_path'): movie_meta['poster_url'] = f"https://image.tmdb.org/t/p/w600_and_h900_bestv2{match.get('poster_path')}"
                  except: pass
                  
              with open(f'hls_output/{target_dir}/metadata.json', 'w') as f: json.dump(movie_meta, f, indent=4)
                  
              existing_idx = next((i for i, item in enumerate(catalog) if item.get('type') == 'movie' and item.get('title') == movie_meta['title'] and item.get('year') == movie_meta['year']), None)
                      
              if existing_idx is not None:
                  if 'quality' in catalog[existing_idx]: del catalog[existing_idx]['quality']
                  catalog[existing_idx].setdefault('available_resolutions', [])
                  catalog[existing_idx].setdefault('available_variations',[])
                  if not isinstance(catalog[existing_idx].get('hls_manifest_url'), dict): catalog[existing_idx]['hls_manifest_url'] = {}
                  
                  if resolution_str not in catalog[existing_idx]['available_resolutions']:
                      catalog[existing_idx]['available_resolutions'].append(resolution_str)
                      catalog[existing_idx]['available_resolutions'] = sorted(catalog[existing_idx]['available_resolutions'], key=lambda r: int(''.join(filter(str.isdigit, r)) or 0))
                      
                  if variation_str not in catalog[existing_idx]['available_variations']: catalog[existing_idx]['available_variations'].append(variation_str)
                  catalog[existing_idx]['hls_manifest_url'][variation_str] = manifest_url
                  if catalog[existing_idx]['id'] == 0 and movie_meta['id'] != 0:
                      catalog[existing_idx]['id'], catalog[existing_idx]['poster_url'] = movie_meta['id'], movie_meta.get('poster_url', '')
                  catalog[existing_idx]['date_added'] = date_added
              else:
                  catalog.append({'id': movie_meta['id'], 'type': 'movie', 'title': movie_meta['title'], 'year': movie_meta['year'], 'date_added': date_added, 'available_resolutions': [resolution_str], 'available_variations': [variation_str], 'hls_manifest_url': {variation_str: manifest_url}, 'poster_url': movie_meta.get('poster_url', '')})
              
          with open(catalog_path, 'w') as f: json.dump(catalog, f, indent=4)
          EOF

      - name: Process Master Loop (Batch Parsing, FFmpeg, Metadata)
        if: env.found == 'true'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          HF_BUCKET: ${{ secrets.HF_BUCKET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p hls_output
          
          while read -u 9 VIDEO_FILE; do
            echo "================================================================"
            echo "🎬 PROCESSING FILE: $VIDEO_FILE"
            
            ROUTING=$(python routing.py "$VIDEO_FILE")
            BASE_DIR=$(echo "$ROUTING" | awk -F'|' '{print $1}')
            SUB_DIR=$(echo "$ROUTING" | awk -F'|' '{print $2}')
            IS_IMAX=$(echo "$ROUTING" | awk -F'|' '{print $3}')
            IS_HDR=$(echo "$ROUTING" | awk -F'|' '{print $4}')
            VARIATION=$(echo "$ROUTING" | awk -F'|' '{print $5}')
            RESOLUTION=$(echo "$ROUTING" | awk -F'|' '{print $6}')
            
            if [ -n "$SUB_DIR" ]; then TARGET_DIR="$BASE_DIR/$SUB_DIR"; else TARGET_DIR="$BASE_DIR"; fi
            
            ORIG_TARGET_DIR="$TARGET_DIR"; COUNTER=2
            while [ -d "hls_output/$TARGET_DIR" ] && [ "$(ls -A "hls_output/$TARGET_DIR" 2>/dev/null)" ]; do
              echo "⚠️ Collision detected! $TARGET_DIR already exists."
              TARGET_DIR="${ORIG_TARGET_DIR}_Part${COUNTER}"
              COUNTER=$((COUNTER+1))
            done
            
            echo "📁 Final Safe HF Directory: $TARGET_DIR"
            mkdir -p "hls_output/$TARGET_DIR" "hls_output/$BASE_DIR"
            
            VIDEO_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
            if [[ "$VIDEO_CODEC" == "hevc" ]]; then V_TAG="-tag:v hvc1"; else V_TAG="-tag:v avc1"; fi

            STREAMS=$(ffprobe -v error -show_streams -of json "$VIDEO_FILE" | jq -r '.streams[] | [.index, .codec_type, (.tags.language // "und"), (.tags.title // "")] | @csv' | tr '[:upper:]' '[:lower:]' | tr -d '"')
            AUDIO_MAPS="-map 0:V:0"
            VAR_STREAM_MAP="v:0,agroup:audio "
            AUDIO_ENCODING=""
            A_IDX=0; AUDIO_SED_CMDS=""
            
            LANG_REGEX="(^|[^a-z])(en|eng|english|hi|hin|hindi|te|tel|telugu|ko|kor|korean)([^a-z]|$)"
            AUDIO_LANG_REGEX="(^|[^a-z])(en|eng|english|hi|hin|hindi|te|tel|telugu|ja|jap|jpn|japan|japanese|ko|kor|korean)([^a-z]|$)"
            DETECTED_AUDIO=""; DETECTED_SUBS=""
            
            while IFS=',' read -r index ctype lang title; do
              if [[ "$ctype" == "audio" ]]; then
                if [[ "$lang $title" =~ $AUDIO_LANG_REGEX ]]; then
                  CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  CHANNELS=$(ffprobe -v error -select_streams $index -show_entries stream=channels -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
                  ORIG_BITRATE=$(ffprobe -v error -select_streams $index -show_entries stream=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
                  
                  case "${lang,,}" in
                    en|eng|english) DISPLAY_LANG="English" ;;
                    hi|hin|hindi) DISPLAY_LANG="Hindi" ;;
                    te|tel|telugu) DISPLAY_LANG="Telugu" ;;
                    ja|jap|jpn|japan|japanese) DISPLAY_LANG="Japanese" ;;
                    ko|kor|korean) DISPLAY_LANG="Korean" ;;
                    *) DISPLAY_LANG="$(echo "${lang:-Unknown}" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" ;;
                  esac

                  if [[ -n "$ORIG_BITRATE" && "$ORIG_BITRATE" =~ ^[0-9]+$ ]]; then
                    ORIG_BITRATE_K="$((ORIG_BITRATE / 1000))k"; DISPLAY_BITRATE="$((ORIG_BITRATE / 1000))kbps"
                  else ORIG_BITRATE_K="256k"; DISPLAY_BITRATE="Original"; fi
                  
                  IS_COMPATIBLE=0
                  if [[ ! "$CODEC" =~ ^(ac3|eac3|dts|truehd|flac|alac|wav|pcm.*|opus|vorbis)$ ]]; then IS_COMPATIBLE=1; fi
                  IS_STEREO=0
                  if [[ -n "$CHANNELS" && "$CHANNELS" =~ ^[0-9]+$ && "$CHANNELS" -le 2 ]]; then IS_STEREO=1; fi

                  if [[ "$IS_COMPATIBLE" -eq 1 && "$IS_STEREO" -eq 1 ]]; then
                    AUDIO_MAPS+=" -map 0:$index"
                    VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und},name:TRACK_${A_IDX} "
                    AUDIO_ENCODING+=" -c:a:$A_IDX copy "
                    AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"U_${DISPLAY_LANG} - ${DISPLAY_BITRATE}\"/g; "
                    DETECTED_AUDIO="$DETECTED_AUDIO ${lang:-und}"; A_IDX=$((A_IDX + 1))
                  else
                    if [[ "$IS_STEREO" -eq 0 ]]; then TARGET_BITRATE_DISP="512kbps"; else TARGET_BITRATE_DISP="${DISPLAY_BITRATE}"; [[ "$TARGET_BITRATE_DISP" == "Original" ]] && TARGET_BITRATE_DISP="256kbps"; fi
                    
                    AUDIO_MAPS+=" -map 0:$index"; VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und},name:TRACK_${A_IDX} "
                    # FRONT-LOADED APAD FOR EOF HANGS
                    if [[ "$IS_STEREO" -eq 0 ]]; then AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX 512k -filter:a:$A_IDX apad,aformat=channel_layouts=5.1,loudnorm=I=-14:TP=-1.5:LRA=11,aresample=48000:resampler=soxr "
                    else AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX ${ORIG_BITRATE_K} -filter:a:$A_IDX apad,aformat=channel_layouts=stereo,loudnorm=I=-16:TP=-1.5:LRA=11,aresample=48000:resampler=soxr "; fi
                    AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"P_${DISPLAY_LANG} - ${TARGET_BITRATE_DISP}\"/g; "; A_IDX=$((A_IDX + 1))
                    
                    AUDIO_MAPS+=" -map 0:$index"; VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und},name:TRACK_${A_IDX} "
                    # FRONT-LOADED APAD FOR EOF HANGS
                    if [[ "$IS_STEREO" -eq 0 ]]; then AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX 512k -filter:a:$A_IDX apad,aformat=channel_layouts=5.1,pan=5.1|FL=FL+0.7*FC|FR=FR+0.7*FC|FC=1.8*FC|LFE=LFE|BL=BL|BR=BR,loudnorm=I=-16:TP=-1.5:LRA=11,aresample=48000:resampler=soxr "
                    else AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX ${ORIG_BITRATE_K} -filter:a:$A_IDX apad,acompressor=threshold=-4dB:ratio=2:attack=5:release=300:makeup=2.5,dynaudnorm=f=150:g=15:m=40.0,aformat=channel_layouts=stereo,aresample=resampler=soxr "; fi
                    AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"M_${DISPLAY_LANG} - ${TARGET_BITRATE_DISP}\"/g; "; A_IDX=$((A_IDX + 1))
                    DETECTED_AUDIO="$DETECTED_AUDIO ${lang:-und}"
                  fi
                fi
              fi
            done <<< "$STREAMS"
            
            if [[ "$A_IDX" -eq 0 ]]; then
              DETECTED_AUDIO="und"
              DISPLAY_LANG="Unknown"
              CODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
              CHANNELS=$(ffprobe -v error -select_streams a:0 -show_entries stream=channels -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
              ORIG_BITRATE=$(ffprobe -v error -select_streams a:0 -show_entries stream=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]')
              
              if [[ -n "$ORIG_BITRATE" && "$ORIG_BITRATE" =~ ^[0-9]+$ ]]; then
                ORIG_BITRATE_K="$((ORIG_BITRATE / 1000))k"; DISPLAY_BITRATE="$((ORIG_BITRATE / 1000))kbps"
              else ORIG_BITRATE_K="256k"; DISPLAY_BITRATE="Original"; fi
              
              IS_COMPATIBLE=0
              if [[ ! "$CODEC" =~ ^(ac3|eac3|dts|truehd|flac|alac|wav|pcm.*|opus|vorbis)$ ]]; then IS_COMPATIBLE=1; fi
              IS_STEREO=0
              if [[ -n "$CHANNELS" && "$CHANNELS" =~ ^[0-9]+$ && "$CHANNELS" -le 2 ]]; then IS_STEREO=1; fi

              if [[ "$IS_COMPATIBLE" -eq 1 && "$IS_STEREO" -eq 1 ]]; then
                AUDIO_MAPS+=" -map 0:a:0"; VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:und,name:TRACK_${A_IDX} "
                AUDIO_ENCODING+=" -c:a:$A_IDX copy "; AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"U_${DISPLAY_LANG} - ${DISPLAY_BITRATE}\"/g; "
                A_IDX=$((A_IDX + 1))
              else
                if [[ "$IS_STEREO" -eq 0 ]]; then TARGET_BITRATE_DISP="512kbps"; else TARGET_BITRATE_DISP="${DISPLAY_BITRATE}"; [[ "$TARGET_BITRATE_DISP" == "Original" ]] && TARGET_BITRATE_DISP="256kbps"; fi
                
                AUDIO_MAPS+=" -map 0:a:0"; VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:und,name:TRACK_${A_IDX} "
                # FRONT-LOADED APAD FOR EOF HANGS
                if [[ "$IS_STEREO" -eq 0 ]]; then AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX 512k -filter:a:$A_IDX apad,aformat=channel_layouts=5.1,loudnorm=I=-14:TP=-1.5:LRA=11,aresample=48000:resampler=soxr "
                else AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX ${ORIG_BITRATE_K} -filter:a:$A_IDX apad,aformat=channel_layouts=stereo,loudnorm=I=-16:TP=-1.5:LRA=11,aresample=48000:resampler=soxr "; fi
                AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"P_${DISPLAY_LANG} - ${TARGET_BITRATE_DISP}\"/g; "; A_IDX=$((A_IDX + 1))
                
                AUDIO_MAPS+=" -map 0:a:0"; VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:und,name:TRACK_${A_IDX} "
                # FRONT-LOADED APAD FOR EOF HANGS
                if [[ "$IS_STEREO" -eq 0 ]]; then AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX 512k -filter:a:$A_IDX apad,aformat=channel_layouts=5.1,pan=5.1|FL=FL+0.7*FC|FR=FR+0.7*FC|FC=1.8*FC|LFE=LFE|BL=BL|BR=BR,loudnorm=I=-16:TP=-1.5:LRA=11,aresample=48000:resampler=soxr "
                else AUDIO_ENCODING+=" -c:a:$A_IDX aac -aac_coder fast -b:a:$A_IDX ${ORIG_BITRATE_K} -filter:a:$A_IDX apad,acompressor=threshold=-4dB:ratio=2:attack=5:release=300:makeup=2.5,dynaudnorm=f=150:g=15:m=40.0,aformat=channel_layouts=stereo,aresample=resampler=soxr "; fi
                AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"M_${DISPLAY_LANG} - ${TARGET_BITRATE_DISP}\"/g; "; A_IDX=$((A_IDX + 1))
              fi
            fi
            VAR_STREAM_MAP="${VAR_STREAM_MAP% }"
            
            # ⏱️ FIX: PRE-CALCULATE EXACT VIDEO DURATION TO PREVENT HANGING AT EOF
            # First, try to get the exact duration of the primary video stream
            V_DUR=$(ffprobe -v error -select_streams v:0 -show_entries stream=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null | head -n 1)
            
            # Fallback: If the video stream duration is hidden, get the overall container duration
            if [[ -z "$V_DUR" || "$V_DUR" == "N/A" ]]; then
              V_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
            fi
            
            # REMOVED -shortest FLAG AND REPLACED WITH HARD DURATION CUTOFF -t "$V_DUR"
            if ! ffmpeg -nostdin -fflags +genpts -i "$VIDEO_FILE" \
              $AUDIO_MAPS -c:v copy $AUDIO_ENCODING $V_TAG \
              -avoid_negative_ts make_zero -muxdelay 0 -muxpreload 0 \
              -max_muxing_queue_size 9999 -f hls -hls_segment_type mpegts \
              -hls_segment_filename "hls_output/$TARGET_DIR/stream_%v_%04d.ts" \
              -var_stream_map "$VAR_STREAM_MAP" -master_pl_name master.m3u8 -hls_time 10 -hls_list_size 0 \
              -t "$V_DUR" \
              "hls_output/$TARGET_DIR/stream_%v.m3u8"; then
              echo "❌ FFMPEG CRASHED! Skipping to next file..."; continue
            fi
            
            if [ -n "$AUDIO_SED_CMDS" ]; then sed -i -e "$AUDIO_SED_CMDS" "hls_output/$TARGET_DIR/master.m3u8"; fi
            
            awk '{ if ($0 ~ /TYPE=AUDIO/) { gsub(/DEFAULT=YES/, "DEFAULT=NO", $0); print $0; } else { print $0; } }' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/temp.m3u8" && mv "hls_output/$TARGET_DIR/temp.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
            if grep -q 'NAME="U_' "hls_output/$TARGET_DIR/master.m3u8"; then awk '/NAME="U_/{ if (!done) { sub(/DEFAULT=NO/, "DEFAULT=YES"); done=1 } } 1' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/temp.m3u8" && mv "hls_output/$TARGET_DIR/temp.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
            elif grep -q 'NAME="M_' "hls_output/$TARGET_DIR/master.m3u8"; then awk '/NAME="M_/{ if (!done) { sub(/DEFAULT=NO/, "DEFAULT=YES"); done=1 } } 1' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/temp.m3u8" && mv "hls_output/$TARGET_DIR/temp.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
            else awk '/TYPE=AUDIO/{ if (!done) { sub(/DEFAULT=NO/, "DEFAULT=YES"); done=1 } } 1' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/temp.m3u8" && mv "hls_output/$TARGET_DIR/temp.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
            fi
            
            awk '/^#EXT-X-STREAM-INF/ { if ($0 ~ /RESOLUTION=/) { getline n; } else { getline n; } next } { print $0 }' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/master_clean.m3u8"
            
            BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
            if [[ -z "$BITRATE" || "$BITRATE" == "N/A" ]]; then
              SIZE=$(stat -c %s "$VIDEO_FILE"); DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
              BITRATE=$(awk "BEGIN {print int(($SIZE * 8) / $DURATION)}")
            fi
            BANDWIDTH=$(awk "BEGIN {print int($BITRATE * 1.1)}")
            
            MANIFEST_RESOLUTION=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 "$VIDEO_FILE" 2>/dev/null)
            MANIFEST_RESOLUTION=$(echo "$MANIFEST_RESOLUTION" | head -n 1 | grep -oE '^[0-9]+x[0-9]+' || echo "1920x1080")
            [ -z "$MANIFEST_RESOLUTION" ] && MANIFEST_RESOLUTION="1920x1080"
            
            if [[ "$VIDEO_CODEC" == "hevc" ]]; then VIDEO_TAG_STR=",CODECS=\"hvc1.2.4.L153.B0,mp4a.40.2\""
            else VIDEO_TAG_STR=",CODECS=\"avc1.640028,mp4a.40.2\""; fi
            
            VIDEO_MANIFEST_INJECTION=$(printf '\n#EXT-X-STREAM-INF:BANDWIDTH=%s,RESOLUTION=%s%s,AUDIO="group_audio"\nstream_0.m3u8\n' "$BANDWIDTH" "$MANIFEST_RESOLUTION" "$VIDEO_TAG_STR")
            mv "hls_output/$TARGET_DIR/master_clean.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
            
            HAS_SUBS="false"; echo "" >> "hls_output/$TARGET_DIR/master.m3u8"
            VID_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
            VID_DUR_INT=$(printf "%.0f" "$VID_DUR" 2>/dev/null || echo "36000")
            
            while IFS=',' read -r index ctype lang title; do
              if [[ "$ctype" == "subtitle" ]]; then
                if [[ "$lang $title" =~ $LANG_REGEX ]]; then
                  SUB_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  if [[ "$SUB_CODEC" =~ ^(subrip|ass|webvtt|mov_text|tx3g)$ ]]; then
                    VTT_BASENAME="subs_${index}_${lang:-und}.vtt"; M3U8_BASENAME="subs_${index}_${lang:-und}.m3u8"
                    VTT_FILE="hls_output/$TARGET_DIR/$VTT_BASENAME"; M3U8_FILE="hls_output/$TARGET_DIR/$M3U8_BASENAME"
                    
                    if ffmpeg -nostdin -y -i "$VIDEO_FILE" -map "0:$index" "$VTT_FILE" >/dev/null 2>&1; then
                      if [ -s "$VTT_FILE" ]; then
                        sed -i '1s/^WEBVTT.*/WEBVTT\nX-TIMESTAMP-MAP=LOCAL:00:00:00.000,MPEGTS:0/' "$VTT_FILE"
                        HAS_SUBS="true"; DETECTED_SUBS="$DETECTED_SUBS ${lang:-und}"
                        SUB_LANG="Unknown"
                        case "${lang,,}" in
                          en|eng|english) SUB_LANG="English" ;;
                          hi|hin|hindi) SUB_LANG="Hindi" ;;
                          te|tel|telugu) SUB_LANG="Telugu" ;;
                          ja|jap|jpn|japan|japanese) SUB_LANG="Japanese" ;;
                          ko|kor|korean) SUB_LANG="Korean" ;;
                          *) [ -n "$lang" ] && SUB_LANG="$(echo "$lang" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" ;;
                        esac

                        CLEAN_TITLE=$(echo "$title" | tr -cd 'a-zA-Z0-9 ()[]_-' | sed 's/^ *//;s/ *$//')
                        CLEAN_TITLE="$(echo "$CLEAN_TITLE" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2)); print $0}')"
                        CLEAN_TITLE=$(echo "$CLEAN_TITLE" | sed 's/\bSdh\b/SDH/g; s/\bCc\b/CC/g')

                        if [[ "${CLEAN_TITLE,,}" == "${lang,,}" || "${CLEAN_TITLE,,}" == "${SUB_LANG,,}" ]]; then CLEAN_TITLE=""; fi
                        if [ -n "$CLEAN_TITLE" ]; then
                          if [[ "${CLEAN_TITLE,,}" == "${SUB_LANG,,}"* ]]; then FINAL_SUB_NAME="$CLEAN_TITLE"
                          else FINAL_SUB_NAME="${SUB_LANG} - ${CLEAN_TITLE}"; fi
                        else FINAL_SUB_NAME="${SUB_LANG}"; fi
                        [ -z "$FINAL_SUB_NAME" ] && FINAL_SUB_NAME="Sub_${index}"
                        
                        printf "#EXTM3U\n#EXT-X-TARGETDURATION:%s\n#EXT-X-VERSION:3\n#EXT-X-PLAYLIST-TYPE:VOD\n#EXTINF:%s,\n%s\n#EXT-X-ENDLIST\n" "$VID_DUR_INT" "$VID_DUR" "$VTT_BASENAME" > "$M3U8_FILE"
                        printf '#EXT-X-MEDIA:TYPE=SUBTITLES,GROUP-ID="group_subs",NAME="%s",LANGUAGE="%s",URI="%s"\n' "$FINAL_SUB_NAME" "${lang:-und}" "$M3U8_BASENAME" >> "hls_output/$TARGET_DIR/master.m3u8"
                      else rm -f "$VTT_FILE"; fi
                    fi
                  fi
                fi
              fi
            done <<< "$STREAMS"
            
            if [[ "$HAS_SUBS" == "false" ]]; then
              echo "⚠️ No matching subtitles found. Scanning unidentified tracks for English..."
              cat << 'EOF' > detect_eng.py
          import sys, re
          try:
              with open(sys.argv[1], 'r', encoding='utf-8', errors='ignore') as f: text = f.read().lower()
              words = re.findall(r'\b[a-z]{2,5}\b', text)
              eng = {'the','and','that','have','for','not','with','you','this','but','his','from','they','say','she','will','what','who','get','when','make','can','like','time','just','know','take','your','good','some','could','them','other','than','then','now','look','only','come','over','think','also','back','after','how','our','first','well','way','even','want','because','any','these','give','most','are','was','were'}
              print('true' if sum(1 for w in words if w in eng) > 15 else 'false')
          except: print('false')
          EOF

              while IFS=',' read -r index ctype lang title; do
                if [[ "$ctype" == "subtitle" ]]; then
                  SUB_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                  if [[ "$SUB_CODEC" =~ ^(subrip|ass|webvtt|mov_text|tx3g)$ ]]; then
                    TEMP_VTT="hls_output/$TARGET_DIR/temp_${index}.vtt"
                    if ffmpeg -nostdin -y -i "$VIDEO_FILE" -map "0:$index" "$TEMP_VTT" >/dev/null 2>&1; then
                      if [ -s "$TEMP_VTT" ]; then
                        IS_ENGLISH=$(python detect_eng.py "$TEMP_VTT")
                        if [[ "$IS_ENGLISH" == "true" ]]; then
                          sed -i '1s/^WEBVTT.*/WEBVTT\nX-TIMESTAMP-MAP=LOCAL:00:00:00.000,MPEGTS:0/' "$TEMP_VTT"
                          VTT_BASENAME="subs_${index}_eng.vtt"; M3U8_BASENAME="subs_${index}_eng.m3u8"
                          mv "$TEMP_VTT" "hls_output/$TARGET_DIR/$VTT_BASENAME"
                          HAS_SUBS="true"; DETECTED_SUBS="$DETECTED_SUBS eng"
                          printf "#EXTM3U\n#EXT-X-TARGETDURATION:%s\n#EXT-X-VERSION:3\n#EXT-X-PLAYLIST-TYPE:VOD\n#EXTINF:%s,\n%s\n#EXT-X-ENDLIST\n" "$VID_DUR_INT" "$VID_DUR" "$VTT_BASENAME" > "hls_output/$TARGET_DIR/$M3U8_BASENAME"
                          printf '#EXT-X-MEDIA:TYPE=SUBTITLES,GROUP-ID="group_subs",NAME="English (Auto)",LANGUAGE="eng",URI="%s"\n' "$M3U8_BASENAME" >> "hls_output/$TARGET_DIR/master.m3u8"
                          break
                        else rm -f "$TEMP_VTT"; fi
                      else rm -f "$TEMP_VTT"; fi
                    fi
                  fi
                fi
              done <<< "$STREAMS"
              rm -f detect_eng.py
            fi
            
            if [[ "$HAS_SUBS" == "true" ]]; then VIDEO_MANIFEST_INJECTION=$(echo "$VIDEO_MANIFEST_INJECTION" | sed 's/AUDIO="group_audio"/AUDIO="group_audio",SUBTITLES="group_subs"/'); fi
            echo "$VIDEO_MANIFEST_INJECTION" >> "hls_output/$TARGET_DIR/master.m3u8"
            
            HF_BASE="https://huggingface.co/buckets/${{ secrets.HF_BUCKET }}/${TARGET_DIR}/"
            HF_BASE=$(python -c "import urllib.parse; print(urllib.parse.quote('$HF_BASE', safe=':/'))")
            find "hls_output/$TARGET_DIR" -name "*.m3u8" -exec sed -i -e "s|^[^#]|${HF_BASE}&|g" -e "s|URI=\"|URI=\"${HF_BASE}|g" {} +

            python metadata_builder.py "$VIDEO_FILE" "$BASE_DIR" "$SUB_DIR" "${DETECTED_AUDIO:-und}" "${DETECTED_SUBS:-}" "$IS_IMAX" "$IS_HDR" "$VARIATION" "$RESOLUTION"

            # 🔥 NEW: Delete the massive original source file to free up runner disk space
            echo "🗑️ Discarding original file to reclaim disk space: $VIDEO_FILE"
            rm -f "$VIDEO_FILE"

          done 9< <(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \))
          
          if [ ! -d "hls_output" ] || [ -z "$(ls -A hls_output)" ]; then
            echo "❌ CRITICAL ERROR: hls_output is empty. Processing failed."
            exit 1
          fi
          
      - name: Sync Output to Storage Bucket
        if: env.found == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_BUCKET: ${{ secrets.HF_BUCKET }}
        run: |
          # Extract the catalog to prevent it from uploading sequentially alongside the media batch
          mv hls_output/session_catalog.json ./session_catalog.json || true
          rm -f hls_output/*.torrent hls_output/*.zip hls_output/temp_* || true
          
          python3 -c "
          import os
          from huggingface_hub import login, sync_bucket
          token = os.environ.get('HF_TOKEN')
          bucket = os.environ.get('HF_BUCKET')
          
          print('🚀 Authenticating Hugging Face SDK...')
          login(token=token)
          
          print('⚡ Initiating ultra-fast Storage Bucket sync via Xet Deduplication...')
          sync_bucket('./hls_output', f'hf://buckets/{bucket}')
          "
          
          echo "✅ Bucket Sync completed successfully."

      - name: Atomic Cloud Catalog Sync
        if: env.found == 'true' && success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_BUCKET: ${{ secrets.HF_BUCKET }}
        run: |
          python -c "
          import os, json
          from huggingface_hub import download_bucket_files, batch_bucket_files

          bucket = os.environ.get('HF_BUCKET')
          token = os.environ.get('HF_TOKEN')

          print('⚡ Fetching Global Catalog from Bucket...')
          try:
              # Directly download the JSON object from the bucket without keyword arguments
              download_bucket_files(bucket, files=[('global_catalog.json', './global_catalog.json')], token=token)
              with open('./global_catalog.json', 'r') as f:
                  global_catalog = json.load(f)
          except Exception as e:
              print('⚠️ No existing catalog found. Generating a new one.')
              global_catalog =[]

          try:
              with open('./session_catalog.json', 'r') as f:
                  session_catalog = json.load(f)
          except Exception:
              session_catalog =[]

          if not session_catalog:
              print('⚠️ No session catalog found. Skipping merge.')
              exit(0)

          for session_item in session_catalog:
              if session_item.get('type') == 'series':
                  global_catalog =[item for item in global_catalog if not (item.get('type') == 'series' and item.get('title') == session_item['title'])]
                  global_catalog.append(session_item)
              elif session_item.get('type') == 'movie':
                  existing_idx = None
                  for i, item in enumerate(global_catalog):
                      if item.get('type') == 'movie' and item.get('title') == session_item['title'] and item.get('year') == session_item['year']:
                          existing_idx = i
                          break
                  if existing_idx is not None:
                      global_catalog[existing_idx].setdefault('available_resolutions', [])
                      global_catalog[existing_idx].setdefault('available_variations', [])
                      if not isinstance(global_catalog[existing_idx].get('hls_manifest_url'), dict):
                          global_catalog[existing_idx]['hls_manifest_url'] = {}
                          
                      for res in session_item.get('available_resolutions',[]):
                          if res not in global_catalog[existing_idx]['available_resolutions']:
                              global_catalog[existing_idx]['available_resolutions'].append(res)
                      global_catalog[existing_idx]['available_resolutions'] = sorted(global_catalog[existing_idx]['available_resolutions'], key=lambda r: int(''.join(filter(str.isdigit, r)) or 0))
                      
                      for var in session_item.get('available_variations', []):
                          if var not in global_catalog[existing_idx]['available_variations']:
                              global_catalog[existing_idx]['available_variations'].append(var)
                              
                      if isinstance(session_item.get('hls_manifest_url'), dict):
                          global_catalog[existing_idx]['hls_manifest_url'].update(session_item['hls_manifest_url'])
                      
                      global_catalog[existing_idx]['date_added'] = session_item['date_added']
                  else:
                      global_catalog.append(session_item)

          with open('./latest_global_catalog.json', 'w') as f:
              json.dump(global_catalog, f, indent=4)

          # Overwrite the catalog file in place using Batch API natively without repo_id mapping errors
          batch_bucket_files(
              bucket,
              add=[('./latest_global_catalog.json', 'global_catalog.json')],
              token=token
          )
          print('✅ Catalog merged and updated instantly in the Bucket.')
          "

      - name: Report Success to Discord
        if: env.found == 'true' && success()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          QUEUE_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          TOTAL_FILES=$(find hls_output -type f | wc -l)
          TOTAL_SIZE=$(du -sh hls_output | cut -f1)
          STATUS_MSG="✅ **Bucket Sync Complete!** \n🎬 Generated: \`${TOTAL_FILES} chunks/files\`\n📦 Total Size: \`${TOTAL_SIZE}\`\n🌐 Synced instantly via Storage Buckets CDN."
          
          ./discord_manager "$DISCORD_TOKEN" "$QUEUE_CHANNEL_ID" delete "$MSG_ID"
          ./discord_manager "$DISCORD_TOKEN" "$PING_CHANNEL_ID" send "$STATUS_MSG"

      - name: Report Failure to Discord
        if: env.found == 'true' && failure()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          FAIL_MSG="❌ **Pipeline Failed!** \n🚨 The Torrent/Drive-to-HLS job crashed during execution.\n🔗 [View Action Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          PAYLOAD=$(jq -n --arg content "$FAIL_MSG" '{content: $content}')
          
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" \
               -H "Content-Type: application/json" \
               -H "User-Agent: DiscordBot (https://github.com, 1.0)" \
               -X POST \
               -d "$PAYLOAD" \
               "https://discord.com/api/v10/channels/$PING_CHANNEL_ID/messages"
