name: Discord Torrent to HLS Pipeline (Native Engine Edition)

on:
  workflow_dispatch:
    inputs:
      target_link:
        description: 'Direct link to payload (Drive, Torrent, Magnet)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg aria2 libcurl4-openssl-dev jq unzip
          pip install -U --break-system-packages "huggingface_hub[cli]" guessit requests google-auth tqdm

      - name: Acknowledge Payload
        id: payload_ack
        run: |
          echo "Target acquired: ${{ inputs.target_link }}"
          echo "TARGET_LINK=${{ inputs.target_link }}" >> $GITHUB_ENV
          echo "found=true" >> $GITHUB_ENV

      - name: Download and Extract Payload
        if: env.found == 'true'
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          mkdir -p workspace
          echo "Evaluating Payload Type..."
          
          if [[ "$TARGET_LINK" == *drive.google.com* ]] || [[ "$TARGET_LINK" == *drive.usercontent.google.com* ]]; then
            if [[ "$TARGET_LINK" == *\&at=* ]] || [[ "$TARGET_LINK" == *confirm=t* ]]; then
              echo "🚀 Detected Pre-Authenticated Direct Drive Link. Bypassing APIs and fetching natively..."
              cd workspace
              curl -# -L -OJ "$TARGET_LINK"
              cd ..
            else
              echo "🌐 Detected Standard Google Drive Link. Initializing Lightning SA Downloader..."
              
              cat << 'EOF' > gdrive_sa_dl.py
          import os, sys, re, json
          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          from tqdm import tqdm

          link = sys.argv[1]
          sa_json_str = os.environ.get('GCP_SA_JSON')

          if not sa_json_str:
              print("❌ CRITICAL ERROR: GCP_SA_JSON secret is missing.")
              sys.exit(1)

          try:
              sa_info = json.loads(sa_json_str)
              creds = service_account.Credentials.from_service_account_info(sa_info, scopes=['https://www.googleapis.com/auth/drive.readonly'])
              creds.refresh(Request())
              headers = {'Authorization': f'Bearer {creds.token}'}
          except Exception as e:
              print(f"❌ Authentication Failed: {e}")
              sys.exit(1)

          match = re.search(r'(id=|/d/|folders/)([a-zA-Z0-9_-]+)', link)
          if not match:
              print("❌ Could not extract ID from link.")
              sys.exit(1)
          file_id = match.group(2)

          def download_file(fid, fname):
              print(f"⬇️ Authenticated SA Download started for: {fname}")
              try:
                  url = f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media"
                  with requests.get(url, headers=headers, stream=True) as r:
                      r.raise_for_status()
                      
                      # Extract file size for the progress bar
                      total_size = int(r.headers.get('Content-Length', 0))
                      
                      # Initialize tqdm tailored for GitHub Actions
                      progress_bar = tqdm(total=total_size, unit='iB', unit_scale=True, desc=fname[:30], mininterval=2.0, ascii=True)
                      
                      with open(os.path.join("workspace", fname), 'wb') as f:
                          for chunk in r.iter_content(chunk_size=1024*1024*10):
                              if chunk: 
                                  f.write(chunk)
                                  progress_bar.update(len(chunk))
                      
                      progress_bar.close()
                  print(f"✅ Download complete: {fname}")
              except Exception as e:
                  print(f"\n❌ Download Failed: {e}")
                  sys.exit(1)

          def process_node(fid):
              try:
                  url = f"https://www.googleapis.com/drive/v3/files/{fid}?fields=name,mimeType"
                  res = requests.get(url, headers=headers).json()
              except Exception as e:
                  sys.exit(1)

              if res.get('mimeType') == 'application/vnd.google-apps.folder':
                  q_url = f"https://www.googleapis.com/drive/v3/files?q='{fid}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)"
                  children = requests.get(q_url, headers=headers).json().get('files', [])
                  for child in children:
                      if child['mimeType'] == 'application/vnd.google-apps.folder': process_node(child['id'])
                      else: download_file(child['id'], child['name'])
              else: download_file(fid, res['name'])

          process_node(file_id)
          EOF
              python gdrive_sa_dl.py "$TARGET_LINK"
            fi
            
          elif [[ "$TARGET_LINK" == http* ]]; then
            echo "📎 Detected HTTP Link. Fetching torrent file explicitly..."
            curl -s -L -o "workspace/payload.torrent" "$TARGET_LINK"
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 "workspace/payload.torrent" -d workspace/
            echo "✅ Download complete: Torrent Payload"
          else
            echo "🧲 Detected Magnet Link. Fetching metadata natively..."
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 --bt-save-metadata=true "$TARGET_LINK" -d workspace/
            echo "✅ Download complete: Magnet Payload"
          fi
          
          while read -u 9 ZIP_FILE; do
            unzip -q -o "$ZIP_FILE" -d workspace/
            rm "$ZIP_FILE"
          done 9< <(find workspace -type f -name "*.zip")
          
          VIDEO_COUNT=$(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \) | wc -l)
          if [ "$VIDEO_COUNT" -eq 0 ]; then
             exit 1
          fi

      - name: Generate Python Helper Scripts
        if: env.found == 'true'
        run: |
          cat << 'EOF' > routing.py
          import os, sys, re, subprocess
          from guessit import guessit
          
          file_path = sys.argv[1]
          filename = os.path.basename(file_path)
          g = guessit(filename)
          
          vid_type = g.get('type')
          title = str(g.get('title', '')).strip()
          
          year_matches = list(re.finditer(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', filename))
          if year_matches:
              last_year_match = year_matches[-1]
              raw_prefix = filename[:last_year_match.start()]
              
              raw_prefix = re.split(r'(?i)[ _.-]+(?:S\d{1,2}E\d{1,4}|S\d{1,2}|Season\s?\d{1,2}|E\d{1,4})\b', raw_prefix)[0]
              
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title) and regex_title.lower() != 'unknown': 
                  title = regex_title
              year = last_year_match.group(1)
          else: year = str(g.get('year', ''))
                  
          if not title: title = 'Unknown_Title'
          title = title.title().replace(' ', '.')
          
          quality_raw = str(g.get('screen_size', '')).lower()
          if '4k' in quality_raw or '2160' in quality_raw or '3840' in quality_raw:
              resolution = '2160p'
          elif '720' in quality_raw or '1280' in quality_raw:
              resolution = '720p'
          else:
              resolution = '1080p'

          is_hdr = bool(re.search(r'(hdr|dovi|\bdv\b)', filename.lower()))
          dynamic_range = 'HDR' if is_hdr else 'SDR'

          is_imax = 'imax' in filename.lower()
          if not is_imax:
              try:
                  cmd =['ffprobe', '-v', 'error', '-select_streams', 'v:0', '-show_entries', 'stream=width,height', '-of', 'csv=s=x:p=0', file_path]
                  res = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
                  w, h = map(float, res.stdout.strip().split('x'))
                  ar = w / h
                  if (1.40 <= ar <= 1.45) or (1.85 <= ar <= 1.95): is_imax = True
              except: pass
              
          imax_tag = '.IMAX' if is_imax else ''
          variation_str = f"{resolution}{imax_tag}.{dynamic_range}"

          s, e = g.get('season'), g.get('episode')
          if not s:
              s_match = re.search(r'[Ss](\d{1,2})[Ee]\d', filename)
              if s_match: s = int(s_match.group(1))
              else:
                  s_path_match = re.search(r'[Ss]eason\s?0*(\d{1,2})', file_path, re.IGNORECASE)
                  if s_path_match: s = int(s_path_match.group(1))

          if not e:
              anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', filename)
              if anime_match: e = anime_match.group(1); vid_type = 'episode'

          ep_title = str(g.get('episode_title', '')).title().replace(' ', '.')
          if ep_title and vid_type != 'episode': title = f'{title}.{ep_title}'
          title = re.sub(r'[^a-zA-Z0-9.\-]', '', title)
                  
          if vid_type == 'episode' or e:
              s_val = int(s[0] if isinstance(s, list) else s) if s is not None and str(s).strip() != "" else 1
              e_val = int(e[0] if isinstance(e, list) else e) if e is not None and str(e).strip() != "" else 1
              base_dir = f"{title}.{year}" if year else title
              print(f'{base_dir}|Season.{s_val:02d}/Episode.{e_val:02d}|{is_imax}|{is_hdr}|{variation_str}|{resolution}')
          else:
              base_dir = f"{title}.{year}.{variation_str}" if year else f"{title}.{variation_str}"
              print(f'{base_dir}||{is_imax}|{is_hdr}|{variation_str}|{resolution}')
          EOF

          cat << 'EOF' > metadata_builder.py
          import os, json, requests, subprocess, sys, re, time, urllib.parse
          from guessit import guessit
          
          file_path, base_dir, sub_dir, audio_str, subs_json_str, is_imax_str, is_hdr_str, variation_str, resolution_str = sys.argv[1:10]
          
          is_imax, is_hdr = is_imax_str.lower() == 'true', is_hdr_str.lower() == 'true'
          available_audio_json = json.dumps(list(set([x.strip() for x in audio_str.split() if x.strip()])))
          date_added = int(time.time())
          
          filename = os.path.basename(file_path)
          target_dir = os.path.join(base_dir, sub_dir) if sub_dir else base_dir
          g = guessit(filename)
          title = str(g.get('title', '')).strip()
          
          year_matches = list(re.finditer(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', filename))
          if year_matches:
              last_year_match = year_matches[-1]
              raw_prefix = filename[:last_year_match.start()]
              raw_prefix = re.split(r'(?i)[ _.-]+(?:S\d{1,2}E\d{1,4}|S\d{1,2}|Season\s?\d{1,2}|E\d{1,4})\b', raw_prefix)[0]
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title) and regex_title.lower() != 'unknown': title = regex_title
              year = last_year_match.group(1)
          else: year = str(g.get('year', ''))
          if not title: title = 'Unknown Title'

          dur_seconds = 0.0
          try:
              cmd =['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
              res = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              dur_seconds = float(res.stdout.strip())
          except: pass

          def format_dur(secs):
              h, m = int(secs // 3600), int((secs % 3600) // 60)
              return f'{h}h{m}m' if h > 0 else f'{m}m'
          duration_formatted = format_dur(dur_seconds)

          hf_bucket = os.environ.get('HF_BUCKET', '')
          safe_target_dir = urllib.parse.quote(target_dir)
          
          # HLS Resolution Link updated with /resolve/
          manifest_url = f'https://huggingface.co/buckets/{hf_bucket}/resolve/{safe_target_dir}/master.m3u8'
          base_resolve_url = f'https://huggingface.co/buckets/{hf_bucket}/resolve/{safe_target_dir}'
          
          # Map Subtitle Sidecars
          try:
              available_subs = json.loads(subs_json_str)
              for sub in available_subs:
                  sub['url'] = f"{base_resolve_url}/{sub['url']}"
          except:
              available_subs = []
          available_subs_json = json.dumps(available_subs)

          tmdb_key = os.environ.get('TMDB_API_KEY')
          payload = {"media": {"type": "series" if sub_dir else "movie", "title": title, "year": year, "rating": 0.0, "poster_url": "", "backdrop_url": ""}}
          
          media_id_str = re.sub(r'[^a-z0-9]', '', f"{title.lower()}{year}")
          if tmdb_key and title != 'Unknown Title':
              search_type = 'tv' if sub_dir else 'movie'
              search_url = f'https://api.themoviedb.org/3/search/{search_type}?api_key={tmdb_key}&query={title}'
              if year: search_url += f'&year={year}' if search_type == 'movie' else f'&first_air_date_year={year}'
              try:
                  res = requests.get(search_url).json()
                  if res.get('results'):
                      match = res['results'][0]
                      media_id_str = str(match.get('id', media_id_str))
                      payload["media"]["title"] = match.get('name' if sub_dir else 'title', title)
                      if not payload["media"]["year"]: payload["media"]["year"] = match.get('first_air_date' if sub_dir else 'release_date', '')[:4]
                      payload["media"]["rating"] = round(match.get('vote_average', 0.0), 1)
                      if match.get('poster_path'): payload["media"]["poster_url"] = f"https://image.tmdb.org/t/p/w600_and_h900_bestv2{match.get('poster_path')}"
                      if match.get('backdrop_path'): payload["media"]["backdrop_url"] = f"https://image.tmdb.org/t/p/original{match.get('backdrop_path')}"
              except: pass
          
          payload["media"]["id"] = media_id_str

          search_tags = set()
          if is_imax: search_tags.add("imax")
          if is_hdr: search_tags.add("hdr")
          if resolution_str: search_tags.add(resolution_str.lower())
          if payload["media"]["year"]: search_tags.add(str(payload["media"]["year"]))
          
          if 'match' in locals():
              orig_title = match.get('original_title') or match.get('original_name') or ''
              if orig_title and orig_title.lower() != payload["media"]["title"].lower():
                  search_tags.add(re.sub(r'[^a-zA-Z0-9\s]', '', orig_title.lower()))
                  
          payload["media"]["search_tags"] = " ".join(filter(None, search_tags))

          if sub_dir:
              s_val, e_val = g.get('season'), g.get('episode')
              if not s_val:
                  s_match = re.search(r'[Ss](\d{1,2})[Ee]\d', filename)
                  if s_match: s_val = int(s_match.group(1))
              if not e_val:
                  anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', filename)
                  if anime_match: e_val = int(anime_match.group(1))
              
              season_num = int(s_val[0] if isinstance(s_val, list) else s_val) if s_val is not None and str(s_val).strip() != "" else 1
              episode_num = int(e_val[0] if isinstance(e_val, list) else e_val) if e_val is not None and str(e_val).strip() != "" else 1
              
              episode_name = f'Episode {episode_num}'
              if tmdb_key and media_id_str.isdigit():
                  try:
                      ep_res = requests.get(f'https://api.themoviedb.org/3/tv/{media_id_str}/season/{season_num}/episode/{episode_num}?api_key={tmdb_key}').json()
                      if ep_res.get('name'): episode_name = ep_res['name']
                  except: pass
              
              payload["episode"] = {
                  "id": f"ep_{media_id_str}_S{season_num:02d}E{episode_num:02d}",
                  "media_id": media_id_str, "season_number": season_num, "episode_number": episode_num,
                  "episode_name": episode_name, "duration": duration_formatted, "date_added": date_added,
                  "quality": resolution_str,
                  "hls_manifest_url": manifest_url,
                  "available_audio": available_audio_json,
                  "available_subs": available_subs_json
              }
          else:
              payload["movie_source"] = {
                  "id": f"movie_{media_id_str}_{variation_str}",
                  "media_id": media_id_str, "variation_name": variation_str, "quality": resolution_str,
                  "is_imax": is_imax, "is_hdr": is_hdr, 
                  "hls_manifest_url": manifest_url,
                  "available_audio": available_audio_json, 
                  "available_subs": available_subs_json
              }
          
          payloads_path = 'd1_payloads.json'
          try:
              with open(payloads_path, 'r') as f: payloads = json.load(f)
          except: payloads = []
          
          payloads.append(payload)
          with open(payloads_path, 'w') as f: json.dump(payloads, f, indent=4)
          EOF

      - name: Compile Pipeline Worker (Phase 1 - Audio & Subtitle Routing)
        if: env.found == 'true'
        run: |
          cat << 'EOF' > worker.sh
          #!/bin/bash
          VIDEO_FILE="$1"
          echo "================================================================"
          echo "🎬 PROCESSING FILE: $VIDEO_FILE"
          
          ROUTING=$(python routing.py "$VIDEO_FILE")
          BASE_DIR=$(echo "$ROUTING" | awk -F'|' '{print $1}')
          SUB_DIR=$(echo "$ROUTING" | awk -F'|' '{print $2}')
          IS_IMAX=$(echo "$ROUTING" | awk -F'|' '{print $3}')
          IS_HDR=$(echo "$ROUTING" | awk -F'|' '{print $4}')
          VARIATION=$(echo "$ROUTING" | awk -F'|' '{print $5}')
          RESOLUTION=$(echo "$ROUTING" | awk -F'|' '{print $6}')
          
          if [ -n "$SUB_DIR" ]; then TARGET_DIR="$BASE_DIR/$SUB_DIR"; else TARGET_DIR="$BASE_DIR"; fi
          
          ORIG_TARGET_DIR="$TARGET_DIR"; COUNTER=2
          while [ -d "hls_output/$TARGET_DIR" ] && [ "$(ls -A "hls_output/$TARGET_DIR" 2>/dev/null)" ]; do
            echo "⚠️ Collision detected! $TARGET_DIR already exists."
            TARGET_DIR="${ORIG_TARGET_DIR}_Part${COUNTER}"
            COUNTER=$((COUNTER+1))
          done
          
          echo "📁 Final Safe HF Directory: $TARGET_DIR"
          mkdir -p "hls_output/$TARGET_DIR" "hls_output/$BASE_DIR"
          
          VIDEO_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          if [[ "$VIDEO_CODEC" == "hevc" ]]; then V_TAG="-tag:v hvc1"; else V_TAG="-tag:v avc1"; fi

          STREAMS=$(ffprobe -v error -show_streams -of json "$VIDEO_FILE" | jq -r '.streams[] | [.index, .codec_type, (.tags.language // "und"), (.tags.title // "")] | @csv' | tr '[:upper:]' '[:lower:]' | tr -d '"')
          
          # Native Audio Variables
          AUDIO_MAPS="-map 0:V:0"
          VAR_STREAM_MAP="v:0,agroup:audio "
          AUDIO_ENCODING=""
          A_IDX=0; AUDIO_SED_CMDS=""
          DETECTED_AUDIO=""
          
          # Native Subtitle Sidecar Variables
          DETECTED_SUBS_JSON="["
          FIRST_SUB=1
          
          # ---> FIX: Re-introduced LANG_REGEX for English subtitles <---
          LANG_REGEX="(^|[^a-z])(en|eng|english)([^a-z]|$)"
          AUDIO_LANG_REGEX="(^|[^a-z])(en|eng|english|hi|hin|hindi|te|tel|telugu|ja|jap|jpn|japan|japanese|ko|kor|korean)([^a-z]|$)"
          
          while IFS=',' read -r index ctype lang title; do
            if [[ "$ctype" == "audio" ]]; then
              if [[ "$lang $title" =~ $AUDIO_LANG_REGEX ]]; then
                case "${lang,,}" in
                  en|eng|english) DISPLAY_LANG="English" ;;
                  hi|hin|hindi) DISPLAY_LANG="Hindi" ;;
                  te|tel|telugu) DISPLAY_LANG="Telugu" ;;
                  ja|jap|jpn|japan|japanese) DISPLAY_LANG="Japanese" ;;
                  ko|kor|korean) DISPLAY_LANG="Korean" ;;
                  *) DISPLAY_LANG="$(echo "${lang:-Unknown}" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" ;;
                esac

                # 100% Passthrough Direct Copy
                AUDIO_MAPS+=" -map 0:$index"
                VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und},name:TRACK_${A_IDX} "
                AUDIO_ENCODING+=" -c:a:$A_IDX copy "
                AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"${DISPLAY_LANG}\"/g; "
                DETECTED_AUDIO="$DETECTED_AUDIO ${lang:-und}"
                A_IDX=$((A_IDX + 1))
              fi
            elif [[ "$ctype" == "subtitle" ]]; then
              # ---> FIX: Enforced English-only filtering before extraction <---
              if [[ "$lang $title" =~ $LANG_REGEX ]]; then
                # Raw Native Sidecar Extraction
                SUB_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
                EXT=""
                case "$SUB_CODEC" in
                  subrip) EXT="srt" ;;
                  ass) EXT="ass" ;;
                  webvtt) EXT="vtt" ;;
                  hdmv_pgs_subtitle) EXT="sup" ;;
                  dvd_subtitle) EXT="sub" ;;
                esac
                
                if [ -n "$EXT" ]; then
                  SUB_FILE="subs_${index}_${lang:-und}.${EXT}"
                  if ffmpeg -nostdin -y -i "$VIDEO_FILE" -map "0:$index" -c:s copy "hls_output/$TARGET_DIR/$SUB_FILE" >/dev/null 2>&1; then
                    case "${lang,,}" in
                      en|eng|english) SUB_LANG="English" ;;
                      hi|hin|hindi) SUB_LANG="Hindi" ;;
                      te|tel|telugu) SUB_LANG="Telugu" ;;
                      ja|jap|jpn|japan|japanese) SUB_LANG="Japanese" ;;
                      ko|kor|korean) SUB_LANG="Korean" ;;
                      *) [ -n "$lang" ] && SUB_LANG="$(echo "$lang" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" ;;
                    esac

                    CLEAN_TITLE=$(echo "$title" | tr -cd 'a-zA-Z0-9 ()[]_-' | sed 's/^ *//;s/ *$//')
                    CLEAN_TITLE="$(echo "$CLEAN_TITLE" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2)); print $0}')"
                    CLEAN_TITLE=$(echo "$CLEAN_TITLE" | sed 's/\bSdh\b/SDH/g; s/\bCc\b/CC/g')

                    if [[ "${CLEAN_TITLE,,}" == "${lang,,}" || "${CLEAN_TITLE,,}" == "${SUB_LANG,,}" ]]; then CLEAN_TITLE=""; fi
                    if [ -n "$CLEAN_TITLE" ]; then
                      if [[ "${CLEAN_TITLE,,}" == "${SUB_LANG,,}"* ]]; then FINAL_SUB_NAME="$CLEAN_TITLE"
                      else FINAL_SUB_NAME="${SUB_LANG} - ${CLEAN_TITLE}"; fi
                    else FINAL_SUB_NAME="${SUB_LANG}"; fi
                    [ -z "$FINAL_SUB_NAME" ] && FINAL_SUB_NAME="Sub_${index}"
                    
                    if [ $FIRST_SUB -eq 0 ]; then DETECTED_SUBS_JSON+=", "; fi
                    DETECTED_SUBS_JSON+="{\"language\":\"$FINAL_SUB_NAME\",\"codec\":\"$SUB_CODEC\",\"url\":\"$SUB_FILE\"}"
                    FIRST_SUB=0
                  fi
                fi
              fi
            fi
          done <<< "$STREAMS"
          DETECTED_SUBS_JSON+="]"
          
          # Failsafe if no matching audio
          if [[ "$A_IDX" -eq 0 ]]; then
            DETECTED_AUDIO="und"
            AUDIO_MAPS+=" -map 0:a:0"; VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:und,name:TRACK_${A_IDX} "
            AUDIO_ENCODING+=" -c:a:$A_IDX copy "; AUDIO_SED_CMDS+="s/NAME=\"audio_$((A_IDX + 1))\"/NAME=\"Unknown - Original\"/g; "
          fi
          
          VAR_STREAM_MAP="${VAR_STREAM_MAP% }"
          EOF

      - name: Compile Pipeline Worker (Phase 2 - Muxing & Execution)
        if: env.found == 'true'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          HF_BUCKET: ${{ secrets.HF_BUCKET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cat << 'EOF' >> worker.sh
          
          V_DUR=$(ffprobe -v error -select_streams v:0 -show_entries stream=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null | head -n 1)
          if [[ -z "$V_DUR" || "$V_DUR" == "N/A" ]]; then
            V_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
          fi
          
          if ! ffmpeg -nostdin -v error -stats -fflags +genpts -i "$VIDEO_FILE" \
            $AUDIO_MAPS -c:v copy $AUDIO_ENCODING $V_TAG \
            -avoid_negative_ts make_zero -muxdelay 0 -muxpreload 0 \
            -max_muxing_queue_size 9999 -f hls -hls_segment_type mpegts \
            -hls_segment_filename "hls_output/$TARGET_DIR/stream_%v_%04d.ts" \
            -var_stream_map "$VAR_STREAM_MAP" -master_pl_name master.m3u8 -hls_time 10 -hls_list_size 0 \
            -t "$V_DUR" \
            "hls_output/$TARGET_DIR/stream_%v.m3u8"; then
            echo "❌ FFMPEG CRASHED! Skipping to next file..."; exit 1
          fi
          
          if [ -n "$AUDIO_SED_CMDS" ]; then sed -i -e "$AUDIO_SED_CMDS" "hls_output/$TARGET_DIR/master.m3u8"; fi
          
          awk '{ if ($0 ~ /TYPE=AUDIO/) { gsub(/DEFAULT=YES/, "DEFAULT=NO", $0); print $0; } else { print $0; } }' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/temp.m3u8" && mv "hls_output/$TARGET_DIR/temp.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
          if grep -q 'NAME="U_' "hls_output/$TARGET_DIR/master.m3u8"; then awk '/NAME="U_/{ if (!done) { sub(/DEFAULT=NO/, "DEFAULT=YES"); done=1 } } 1' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/temp.m3u8" && mv "hls_output/$TARGET_DIR/temp.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
          else awk '/TYPE=AUDIO/{ if (!done) { sub(/DEFAULT=NO/, "DEFAULT=YES"); done=1 } } 1' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/temp.m3u8" && mv "hls_output/$TARGET_DIR/temp.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
          fi
          
          awk '/^#EXT-X-STREAM-INF/ { if ($0 ~ /RESOLUTION=/) { getline n; } else { getline n; } next } { print $0 }' "hls_output/$TARGET_DIR/master.m3u8" > "hls_output/$TARGET_DIR/master_clean.m3u8"
          
          BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
          if [[ -z "$BITRATE" || "$BITRATE" == "N/A" ]]; then
            SIZE=$(stat -c %s "$VIDEO_FILE"); DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
            BITRATE=$(awk "BEGIN {print int(($SIZE * 8) / $DURATION)}")
          fi
          BANDWIDTH=$(awk "BEGIN {print int($BITRATE * 1.1)}")
          
          MANIFEST_RESOLUTION=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 "$VIDEO_FILE" 2>/dev/null)
          MANIFEST_RESOLUTION=$(echo "$MANIFEST_RESOLUTION" | head -n 1 | grep -oE '^[0-9]+x[0-9]+' || echo "1920x1080")
          [ -z "$MANIFEST_RESOLUTION" ] && MANIFEST_RESOLUTION="1920x1080"
          
          if [[ "$VIDEO_CODEC" == "hevc" ]]; then VIDEO_TAG_STR=",CODECS=\"hvc1.2.4.L153.B0,mp4a.40.2\""
          else VIDEO_TAG_STR=",CODECS=\"avc1.640028,mp4a.40.2\""; fi
          
          VIDEO_MANIFEST_INJECTION=$(printf '\n#EXT-X-STREAM-INF:BANDWIDTH=%s,RESOLUTION=%s%s,AUDIO="group_audio"\nstream_0.m3u8\n' "$BANDWIDTH" "$MANIFEST_RESOLUTION" "$VIDEO_TAG_STR")
          mv "hls_output/$TARGET_DIR/master_clean.m3u8" "hls_output/$TARGET_DIR/master.m3u8"
          
          echo "$VIDEO_MANIFEST_INJECTION" >> "hls_output/$TARGET_DIR/master.m3u8"
          
          # HLS /resolve/ Injection
          HF_BASE="https://huggingface.co/buckets/${HF_BUCKET}/resolve/${TARGET_DIR}/"
          HF_BASE=$(python -c "import urllib.parse; print(urllib.parse.quote('$HF_BASE', safe=':/'))")
          find "hls_output/$TARGET_DIR" -name "*.m3u8" -exec sed -i -e "s|^[^#]|${HF_BASE}&|g" -e "s|URI=\"|URI=\"${HF_BASE}|g" {} +

          python metadata_builder.py "$VIDEO_FILE" "$BASE_DIR" "$SUB_DIR" "${DETECTED_AUDIO:-und}" "$DETECTED_SUBS_JSON" "$IS_IMAX" "$IS_HDR" "$VARIATION" "$RESOLUTION"

          echo "🗑️ Discarding original file to reclaim disk space: $VIDEO_FILE"
          rm -f "$VIDEO_FILE"
          EOF
          
          mkdir -p hls_output
          chmod +x worker.sh
          
          while read -u 9 VIDEO_FILE; do
            ./worker.sh "$VIDEO_FILE"
          done 9< <(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \))
          
          if [ ! -d "hls_output" ] || [ -z "$(ls -A hls_output)" ]; then
            echo "❌ CRITICAL ERROR: hls_output is empty. Processing failed."
            exit 1
          fi

      - name: Cooldown
        if: env.found == 'true'
        run: |
          echo "⏳ Pausing for 5 minutes before sync..."
          sleep 360
          echo "✅ Resuming."
          
      - name: Sync Output to Storage Bucket
        if: env.found == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_BUCKET: ${{ secrets.HF_BUCKET }}
        run: |
          rm -f hls_output/*.torrent hls_output/*.zip hls_output/temp_* || true
          
          python3 -c "
          import os
          from huggingface_hub import sync_bucket, batch_bucket_files
          token = os.environ.get('HF_TOKEN')
          bucket = os.environ.get('HF_BUCKET')
          
          print('⚡ Initiating targeted Storage Bucket sync...')
          for item in os.listdir('./hls_output'):
              local_path = os.path.join('./hls_output', item)
              if os.path.isdir(local_path):
                  print(f'📤 Syncing directory: {item}...')
                  sync_bucket(local_path, f'hf://buckets/{bucket}/{item}', token=token)
              elif os.path.isfile(local_path):
                  print(f'📤 Uploading standalone file: {item}...')
                  batch_bucket_files(bucket, add=[(local_path, item)], token=token)
          "
          echo "✅ Bucket Sync completed successfully."

      - name: Sync Metadata to Cloudflare D1
        if: env.found == 'true' && success()
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          if [ -f "d1_payloads.json" ]; then
            echo "🔍 Validating D1 payload schema..."
            jq . d1_payloads.json > /dev/null
            
            echo "🚀 Sending payload array to Cloudflare Edge..."
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST -H "Content-Type: application/json" -d @d1_payloads.json "${CF_WORKER_URL%/}/api/ingest")
            
            HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
            BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
            
            if [ "$HTTP_STATUS" -ge 400 ]; then
              echo "❌ D1 Ingestion failed! Status: $HTTP_STATUS"
              echo "Detail: $BODY"
              exit 1
            fi
            
            echo "✅ D1 Database Sync completed successfully."
          else
            echo "⚠️ No d1_payloads.json found to sync."
          fi

      - name: Report Success to Discord
        if: env.found == 'true' && success()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          TOTAL_FILES=$(find hls_output -type f | wc -l)
          TOTAL_SIZE=$(du -sh hls_output | cut -f1)
          STATUS_MSG="✅ **Bucket Sync Complete!** \n🎬 Generated: \`${TOTAL_FILES} chunks/files\`\n📦 Total Size: \`${TOTAL_SIZE}\`\n🌐 Synced instantly via Storage Buckets CDN."
          
          PAYLOAD=$(jq -n --arg content "$STATUS_MSG" '{content: $content}')
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "https://discord.com/api/v10/channels/$PING_CHANNEL_ID/messages"

      - name: Report Failure to Discord
        if: env.found == 'true' && failure()
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PING_CHANNEL_ID: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          FAIL_MSG="❌ **Pipeline Failed!** \n🚨 The Torrent/Drive-to-HLS job crashed during execution.\n🔗 [View Action Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          PAYLOAD=$(jq -n --arg content "$FAIL_MSG" '{content: $content}')
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "https://discord.com/api/v10/channels/$PING_CHANNEL_ID/messages"
