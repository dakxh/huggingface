name: Anime HLS Engine (.ts + .ass Decoupled)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-anime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg aria2 libcurl4-openssl-dev jq unzip
          pip install huggingface_hub guessit requests google-auth

      - name: Fetch from Discord
        id: discord_fetch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_ANIME_CHANNEL_ID }}
        run: |
          g++ discord_manager.cpp -o discord_manager -lcurl
          
          OUTPUT=$(./discord_manager "$DISCORD_TOKEN" "$CHANNEL_ID" fetch)
          MSG_ID=$(echo "$OUTPUT" | cut -d'|' -f1)
          TARGET_LINK=$(echo "$OUTPUT" | cut -d'|' -f2-)
          
          if [ -z "$TARGET_LINK" ] || [ "$MSG_ID" == "empty" ] || [ "$MSG_ID" == "error" ]; then
            echo "❌ Queue is empty or API Error."
            echo "found=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "🌸 Anime Target acquired: $TARGET_LINK"
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV
          echo "TARGET_LINK=$TARGET_LINK" >> $GITHUB_ENV
          echo "found=true" >> $GITHUB_ENV

      - name: Download Payload
        if: env.found == 'true'
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          mkdir -p workspace
          
          if [[ "$TARGET_LINK" == *drive.google.com* ]] || [[ "$TARGET_LINK" == *drive.usercontent.google.com* ]]; then
            if [[ "$TARGET_LINK" == *\&at=* ]] || [[ "$TARGET_LINK" == *confirm=t* ]]; then
              cd workspace && curl -# -L -OJ "$TARGET_LINK" && cd ..
            else
              cat << 'EOF' > gdrive_sa_dl.py
          import os, sys, re, json, requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          link = sys.argv[1]
          sa_info = json.loads(os.environ.get('GCP_SA_JSON'))
          creds = service_account.Credentials.from_service_account_info(sa_info, scopes=['https://www.googleapis.com/auth/drive.readonly'])
          creds.refresh(Request())
          headers = {'Authorization': f'Bearer {creds.token}'}
          match = re.search(r'(id=|/d/|folders/)([a-zA-Z0-9_-]+)', link)
          def download_file(fid, fname):
              with requests.get(f"https://www.googleapis.com/drive/v3/files/{fid}?alt=media", headers=headers, stream=True) as r:
                  r.raise_for_status()
                  with open(os.path.join("workspace", fname), 'wb') as f:
                      for chunk in r.iter_content(chunk_size=1024*1024*10):
                          if chunk: f.write(chunk)
          def process_node(fid):
              res = requests.get(f"https://www.googleapis.com/drive/v3/files/{fid}?fields=name,mimeType", headers=headers).json()
              if res.get('mimeType') == 'application/vnd.google-apps.folder':
                  children = requests.get(f"https://www.googleapis.com/drive/v3/files?q='{fid}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)", headers=headers).json().get('files', [])
                  for child in children:
                      if child['mimeType'] == 'application/vnd.google-apps.folder': process_node(child['id'])
                      else: download_file(child['id'], child['name'])
              else: download_file(fid, res['name'])
          process_node(match.group(2))
          EOF
              python3 gdrive_sa_dl.py "$TARGET_LINK"
            fi
          elif [[ "$TARGET_LINK" == http* ]]; then
            curl -s -L -o "workspace/payload.torrent" "$TARGET_LINK"
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 "workspace/payload.torrent" -d workspace/
          else
            aria2c --bt-stop-timeout=600 --timeout=600 --seed-time=0 --bt-save-metadata=true "$TARGET_LINK" -d workspace/
          fi
          
          while read -u 9 ZIP_FILE; do unzip -q -o "$ZIP_FILE" -d workspace/; rm "$ZIP_FILE"; done 9< <(find workspace -type f -name "*.zip")

      - name: Generate Anime Python Helpers
        if: env.found == 'true'
        run: |
          cat << 'EOF' > routing.py
          import os, sys, re
          from guessit import guessit
          filename = os.path.basename(sys.argv[1])
          clean_name = re.sub(r'^\[.*?\]\s*', '', filename)
          clean_name = re.sub(r'\s*\[[A-Fa-f0-9]{8}\](?=\.mkv|\.mp4)', '', clean_name)
          g = guessit(clean_name)
          title = str(g.get('title', '')).strip()
          
          # SMART TITLE FALLBACK
          year_match = re.search(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', clean_name)
          if year_match:
              raw_prefix = clean_name[:year_match.start()]
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title):
                  title = regex_title

          if not title:
              m = re.match(r'^(.*?)\s*-\s*(\d+(?:\.\d+)?)', clean_name)
              if m: title = m.group(1)
          title = re.sub(r'[^a-zA-Z0-9.\-]', '', title.title().replace(' ', '.')) or 'Unknown.Anime'
          quality = str(g.get('screen_size', '1080p'))
          s, e = g.get('season'), g.get('episode')
          if not e:
              anime_match = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', clean_name)
              if anime_match: e = anime_match.group(1)
          s_val = int(s[0] if isinstance(s, list) else s) if s else 1
          e_val = int(e[0] if isinstance(e, list) else e) if e else 1
          print(f"{title}.{quality}|Season.{s_val:02d}/Episode.{e_val:02d}")
          EOF

          cat << 'EOF' > metadata_builder.py
          import os, json, requests, subprocess, sys, re, time, urllib.parse
          from guessit import guessit
          
          file_path, base_dir, sub_dir, audio_str, ass_str, fonts_str = sys.argv[1:7]
          available_audio = list(set([x.strip() for x in audio_str.split() if x.strip()]))
          ass_files = [x.strip() for x in ass_str.split() if x.strip()]
          fonts = [x.strip() for x in fonts_str.split('|') if x.strip()]
          target_dir = os.path.join(base_dir, sub_dir)
          HF_ANIME_REPO = os.environ.get('HF_ANIME_REPO', '')
          tmdb_key = os.environ.get('TMDB_API_KEY')
          
          filename = os.path.basename(file_path)
          clean_name = re.sub(r'^\[.*?\]\s*', '', filename)
          clean_name = re.sub(r'\s*\[[A-Fa-f0-9]{8}\]', '', clean_name)
          g = guessit(clean_name)
          
          title = str(g.get('title', '')).strip()
          year_match = re.search(r'(?:\b|\()((?:19|20)\d{2})(?:\b|\))', clean_name)
          if year_match:
              raw_prefix = clean_name[:year_match.start()]
              regex_title = re.sub(r'^\[.*?\]\s*', '', raw_prefix).replace('.', ' ').strip(' -_()[]')
              if len(regex_title) > len(title): title = regex_title
          if not title:
              m = re.match(r'^(.*?)\s*-\s*(\d+(?:\.\d+)?)', clean_name)
              if m: title = m.group(1)
          if not title: title = 'Unknown Anime'

          try:
              cmd = ['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
              dur_seconds = float(subprocess.run(cmd, stdout=subprocess.PIPE, text=True).stdout.strip())
          except: dur_seconds = 0.0
          def format_dur(secs): h, m = int(secs//3600), int((secs%3600)//60); return f'{h}h{m}m' if h>0 else f'{m}m'
          
          is_imax = False
          if 'imax' in filename.lower(): is_imax = True
          else:
              try:
                  cmd = ['ffprobe', '-v', 'error', '-select_streams', 'v:0', '-show_entries', 'stream=width,height', '-of', 'csv=s=x:p=0', file_path]
                  res = subprocess.run(cmd, stdout=subprocess.PIPE, text=True)
                  w, h = map(float, res.stdout.strip().split('x'))
                  if (1.40 <= w/h <= 1.45) or (1.85 <= w/h <= 1.95): is_imax = True
              except: pass
          
          is_hdr = bool(re.search(r'(hdr|dovi|\bdv\b)', filename.lower()))
          size_str = f'{round(os.path.getsize(file_path)/(1024**3), 2)} GB'

          s_val, e_val = g.get('season', 1), g.get('episode', 1)
          if not g.get('episode'):
              am = re.search(r'(?:\s-\s|[Ee][Pp]?\s?|v)(\d{1,4})(?:v\d)?(?:\s|\[|\.|\()', clean_name)
              if am: e_val = int(am.group(1))
          s_num, e_num = int(s_val[0] if isinstance(s_val, list) else s_val), int(e_val[0] if isinstance(e_val, list) else e_val)

          manifest_url = f'https://huggingface.co/datasets/{HF_ANIME_REPO}/resolve/main/{urllib.parse.quote(target_dir)}/master.m3u8'
          base_url = f'https://huggingface.co/datasets/{HF_ANIME_REPO}/resolve/main/{urllib.parse.quote(target_dir)}'
          
          # Initialize or fetch catalog locally
          catalog_path = 'hls_output/global_catalog.json'
          try:
              with open(catalog_path, 'r') as f: catalog = json.load(f)
          except: catalog = []
          
          show_meta = {'id': 0, 'type': 'anime', 'title': title, 'year': '', 'rating': 0.0, 'source': 'WEB-DL', 'quality': str(g.get('screen_size', '1080p')), 'duration': '0m', 'IMAX': is_imax, 'HDR': is_hdr, 'poster_url': '', 'backdrop_url': '', 'overview': '', 'date_added': int(time.time()), '_total_secs': 0.0, '_ep_count': 0, 'episodes': []}
          if os.path.exists(f'hls_output/{base_dir}/metadata.json'):
              with open(f'hls_output/{base_dir}/metadata.json', 'r') as f: show_meta.update(json.load(f))
          
          show_meta['_total_secs'] += dur_seconds; show_meta['_ep_count'] += 1; show_meta['duration'] = format_dur(show_meta['_total_secs']/show_meta['_ep_count'])
          
          if tmdb_key and show_meta['id'] == 0:
              try:
                  res = requests.get(f'https://api.themoviedb.org/3/search/tv?api_key={tmdb_key}&query={title}').json()
                  if not res.get('results'): res = requests.get(f"https://api.themoviedb.org/3/search/tv?api_key={tmdb_key}&query={re.sub(r'(?i)\\b(season|part|cour)\\s*\\d+\\b', '', title).strip()}").json()
                  if res.get('results'):
                      m = res['results'][0]
                      show_meta.update({'id': m.get('id', 0), 'title': m.get('name', title), 'overview': m.get('overview', ''), 'rating': round(m.get('vote_average', 0.0), 1), 'year': m.get('first_air_date', '')[:4], 'poster_url': f"https://image.tmdb.org/t/p/w600_and_h900_bestv2{m.get('poster_path', '')}", 'backdrop_url': f"https://image.tmdb.org/t/p/w1280_and_h720_multi_faces{m.get('backdrop_path', '')}"})
              except: pass
          
          ep_name = f'Episode {e_num}'
          if tmdb_key and show_meta['id'] != 0:
              try: ep_name = requests.get(f'https://api.themoviedb.org/3/tv/{show_meta["id"]}/season/{s_num}/episode/{e_num}?api_key={tmdb_key}').json().get('name', ep_name)
              except: pass

          show_meta['episodes'] = [ep for ep in show_meta.get('episodes', []) if not (ep['season_number']==s_num and ep['episode_number']==e_num)]
          show_meta['episodes'].append({'season_number': s_num, 'episode_number': e_num, 'episode_name': ep_name, 'quality': show_meta['quality'], 'date_added': int(time.time()), 'hls_manifest_url': manifest_url})
          show_meta['episodes'].sort(key=lambda x: (x['season_number'], x['episode_number']))
          with open(f'hls_output/{base_dir}/metadata.json', 'w') as f: json.dump(show_meta, f, indent=4)

          ep_meta = {'id': show_meta['id'], 'series_title': show_meta['title'], 'season_number': s_num, 'episode_number': e_num, 'episode_name': ep_name, 'original_filename': filename, 'quality': show_meta['quality'], 'duration': format_dur(dur_seconds), 'size': size_str, 'available_audio': available_audio, 'ass_subtitles': [f'{base_url}/{urllib.parse.quote(a)}' for a in ass_files], 'fonts': [f'{base_url}/fonts/{urllib.parse.quote(f)}' for f in fonts], 'date_added': int(time.time()), 'hls_manifest_url': manifest_url}
          with open(f'hls_output/{target_dir}/metadata.json', 'w') as f: json.dump(ep_meta, f, indent=4)
          
          # Append to Global Catalog cleanly
          catalog = [item for item in catalog if item.get('type') != 'episode']
          catalog = [item for item in catalog if not (item.get('type') == 'anime' and item.get('title') == show_meta['title'])]
          catalog.append({'id': show_meta['id'], 'type': 'anime', 'title': show_meta['title'], 'year': show_meta['year'], 'quality': show_meta['quality'], 'date_added': int(time.time()), 'series_metadata_url': f"https://huggingface.co/datasets/{HF_ANIME_REPO}/resolve/main/{urllib.parse.quote(base_dir)}/metadata.json", 'poster_url': show_meta.get('poster_url', '')})
          with open(catalog_path, 'w') as f: json.dump(catalog, f, indent=4)
          EOF

      - name: Process Master Anime Loop
        if: env.found == 'true'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          HF_ANIME_REPO: ${{ secrets.HF_ANIME_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p hls_output
          
          # INITIALIZE OR FETCH GLOBAL CATALOG FROM HF
          python -c "
          import os, json, shutil
          from huggingface_hub import hf_hub_download
          repo = os.environ.get('HF_ANIME_REPO')
          token = os.environ.get('HF_TOKEN')
          catalog_path = 'hls_output/global_catalog.json'
          try:
              dl_path = hf_hub_download(repo_id=repo, filename='global_catalog.json', repo_type='dataset', token=token)
              shutil.copy(dl_path, catalog_path)
              print('✅ Successfully pulled existing global_catalog.json')
          except Exception as e:
              print('⚠️ No existing global_catalog.json found. Initializing a new one.')
              with open(catalog_path, 'w') as f: f.write('[]')
          "
          
          while read -u 9 VIDEO_FILE; do
            echo "🎬 PROCESSING ANIME: $VIDEO_FILE"
            
            # Use '|| echo ...' so python crashes don't kill the runner
            ROUTING=$(python3 routing.py "$VIDEO_FILE" || echo "Unknown.Anime.1080p|Season.01/Episode.01")
            BASE_DIR=$(echo "$ROUTING" | cut -d'|' -f1)
            SUB_DIR=$(echo "$ROUTING" | cut -d'|' -f2)
            TARGET_DIR="$BASE_DIR/$SUB_DIR"
            
            # THE COLLISION LOCK
            ORIG_TARGET_DIR="$TARGET_DIR"
            COUNTER=2
            while [ -d "hls_output/$TARGET_DIR" ] && [ "$(ls -A "hls_output/$TARGET_DIR" 2>/dev/null)" ]; do
              echo "⚠️ Collision detected! $TARGET_DIR already exists."
              TARGET_DIR="${ORIG_TARGET_DIR}_Part${COUNTER}"
              COUNTER=$((COUNTER+1))
            done
            
            mkdir -p "hls_output/$TARGET_DIR" "hls_output/$BASE_DIR"

            FONTS_STR=""
            # Safely count attachments
            HAS_ATTACHMENTS=$(ffprobe -v error -show_entries stream=codec_type -of csv=p=0 "$VIDEO_FILE" 2>/dev/null | grep -c -i "attachment" || echo "0")
            if [ "$HAS_ATTACHMENTS" -gt 0 ]; then
              mkdir -p temp_fonts && cd temp_fonts || exit
              ffmpeg -nostdin -y -dump_attachment:t "" -i "../$VIDEO_FILE" >/dev/null 2>&1 || true
              cd ..
              
              if [ "$(ls -A temp_fonts 2>/dev/null || true)" ]; then
                mkdir -p "hls_output/$TARGET_DIR/fonts"
                mv temp_fonts/* "hls_output/$TARGET_DIR/fonts/" 2>/dev/null || true
                for font in "hls_output/$TARGET_DIR/fonts"/*; do
                  if [ -f "$font" ]; then FONTS_STR+="$(basename "$font")|"; fi
                done
              fi
              rm -rf temp_fonts
            fi

            # Setup mapping vars
            STREAMS=$(ffprobe -v error -show_entries stream=index,codec_type:stream_tags=language -of csv=p=0 "$VIDEO_FILE" 2>/dev/null | tr '[:upper:]' '[:lower:]' || true)
            DETECTED_ASS=""; DETECTED_AUDIO=""; AUDIO_MAPS="-map 0:V:0"; VAR_STREAM_MAP="v:0,agroup:audio "; AUDIO_ENCODING=""
            A_IDX=0
            STREAM_IDX=1
            AUDIO_SED_CMDS=""

            while IFS=',' read -r index ctype lang; do
              if [[ -z "$index" ]]; then continue; fi
              
              if [[ "$ctype" == "subtitle" ]]; then
                SUB_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null || true)
                if [[ "$SUB_CODEC" =~ ^(ass|ssa)$ ]]; then
                  # Clean subtitle naming logic for Decoupled ASS files
                  case "${lang,,}" in
                    en|eng|english) SUB_LANG="English" ;;
                    hi|hin|hindi) SUB_LANG="Hindi" ;;
                    te|tel|telugu) SUB_LANG="Telugu" ;;
                    ja|jap|jpn|japan|japanese) SUB_LANG="Japanese" ;;
                    *) [ -n "$lang" ] && SUB_LANG="$(echo "$lang" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" || SUB_LANG="Unknown" ;;
                  esac
                  SAFE_SUB_NAME=$(echo "$SUB_LANG" | tr -cd 'a-zA-Z0-9')
                  ASS_BASENAME="subs_${index}_${SAFE_SUB_NAME}.ass"
                  
                  ffmpeg -nostdin -y -i "$VIDEO_FILE" -map "0:$index" "hls_output/$TARGET_DIR/$ASS_BASENAME" >/dev/null 2>&1 || true
                  
                  if [ -s "hls_output/$TARGET_DIR/$ASS_BASENAME" ]; then
                    DETECTED_ASS+=" ${ASS_BASENAME}"
                  fi
                fi
                
              elif [[ "$ctype" == "audio" ]]; then
                # Safe audio codec probing and conditional transcoding
                A_CODEC=$(ffprobe -v error -select_streams $index -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null | tr -d '[:space:]' || echo "unknown")
                
                case "${lang,,}" in
                  en|eng|english) DISPLAY_LANG="English" ;;
                  hi|hin|hindi) DISPLAY_LANG="Hindi" ;;
                  te|tel|telugu) DISPLAY_LANG="Telugu" ;;
                  ja|jap|jpn|japan|japanese) DISPLAY_LANG="Japanese" ;;
                  *) DISPLAY_LANG="$(echo "${lang:-Unknown}" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')" ;;
                esac

                # ⚡ Transcode FLAC, ALAC, WAV, and unplayable Surround codecs safely
                if [[ "$A_CODEC" =~ ^(ac3|eac3|dts|truehd|flac|alac|wav|pcm.*)$ ]]; then
                  AUDIO_ENCODING+=" -c:a:$A_IDX aac -b:a:$A_IDX 512k -filter:a:$A_IDX aformat=channel_layouts=5.1|stereo "
                  DISPLAY_BITRATE="512kbps"
                else
                  AUDIO_ENCODING+=" -c:a:$A_IDX copy "
                  ORIG_BITRATE=$(ffprobe -v error -select_streams $index -show_entries stream=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null | tr -d '[:space:]')
                  if [[ -n "$ORIG_BITRATE" && "$ORIG_BITRATE" =~ ^[0-9]+$ ]]; then
                    DISPLAY_BITRATE="$((ORIG_BITRATE / 1000))kbps"
                  else
                    DISPLAY_BITRATE="Original"
                  fi
                fi
                
                AUDIO_MAPS+=" -map 0:$index"
                VAR_STREAM_MAP+="a:$A_IDX,agroup:audio,language:${lang:-und} "
                DETECTED_AUDIO+=" ${lang:-und}"
                
                # Setup mapping replacement command
                AUDIO_SED_CMDS+="s/NAME=\"audio_${STREAM_IDX}\"/NAME=\"${DISPLAY_LANG} - ${DISPLAY_BITRATE}\"/g; "
                
                A_IDX=$((A_IDX + 1))
                STREAM_IDX=$((STREAM_IDX + 1))
              fi
            done <<< "$STREAMS"

            # Fallback if no specific audio streams were properly parsed in the loop
            if [[ "$A_IDX" -eq 0 ]]; then 
              AUDIO_MAPS+=" -map 0:a:0"
              DETECTED_AUDIO="und"
              
              A_CODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null | tr -d '[:space:]' || echo "unknown")
              if [[ "$A_CODEC" =~ ^(ac3|eac3|dts|truehd|flac|alac|wav|pcm.*)$ ]]; then
                AUDIO_ENCODING=" -c:a:0 aac -b:a:0 512k -filter:a:0 aformat=channel_layouts=5.1|stereo "
                DISPLAY_BITRATE="512kbps"
              else
                AUDIO_ENCODING=" -c:a:0 copy "
                DISPLAY_BITRATE="Original"
              fi
              
              VAR_STREAM_MAP="v:0,agroup:audio a:0,agroup:audio,language:und "
              AUDIO_SED_CMDS+="s/NAME=\"audio_1\"/NAME=\"Unknown - ${DISPLAY_BITRATE}\"/g; "
            fi
            VAR_STREAM_MAP="${VAR_STREAM_MAP% }"

            VIDEO_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null | tr -d '[:space:]' || true)
            [[ "$VIDEO_CODEC" == "hevc" ]] && V_TAG="-tag:v hvc1" || V_TAG="-tag:v avc1"

            ffmpeg -nostdin -fflags +genpts -i "$VIDEO_FILE" $AUDIO_MAPS -c:v copy $AUDIO_ENCODING $V_TAG \
              -avoid_negative_ts make_zero -muxdelay 0 -muxpreload 0 -max_muxing_queue_size 9999 \
              -f hls -hls_segment_type mpegts -hls_segment_filename "hls_output/$TARGET_DIR/stream_%v_%04d.ts" \
              -var_stream_map "$VAR_STREAM_MAP" -master_pl_name master.m3u8 -hls_time 10 -hls_list_size 0 \
              "hls_output/$TARGET_DIR/stream_%v.m3u8" || continue

            # Apply Audio Sed Replacements directly to the Master M3U8
            if [ -n "$AUDIO_SED_CMDS" ]; then
              sed -i -e "$AUDIO_SED_CMDS" "hls_output/$TARGET_DIR/master.m3u8" || true
            fi
            
            sed -i -E 's/,CODECS="[^"]*"//g' "hls_output/$TARGET_DIR/master.m3u8" || true
            
            # ⚡ THE HEVC CHROME BYPASS & VIDEO INJECTION FAIL-SAFE ⚡
            if ! grep -q "stream_0.m3u8" "hls_output/$TARGET_DIR/master.m3u8"; then
              echo "⚠️ FFmpeg omitted HEVC video from master playlist! Injecting manually..."
              
              BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
              if [[ -z "$BITRATE" || "$BITRATE" == "N/A" ]]; then
                SIZE=$(stat -c %s "$VIDEO_FILE")
                DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE" 2>/dev/null)
                BITRATE=$(awk "BEGIN {print int(($SIZE * 8) / $DURATION)}")
              fi
              BANDWIDTH=$(awk "BEGIN {print int($BITRATE * 1.1)}")
              RESOLUTION=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 "$VIDEO_FILE" 2>/dev/null)
              [ -z "$RESOLUTION" ] && RESOLUTION="1920x1080"
              
              printf '\n#EXT-X-STREAM-INF:BANDWIDTH=%s,RESOLUTION=%s,AUDIO="group_audio"\nstream_0.m3u8\n' "$BANDWIDTH" "$RESOLUTION" >> "hls_output/$TARGET_DIR/master.m3u8"
            fi

            HF_BASE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('https://huggingface.co/datasets/${HF_ANIME_REPO}/resolve/main/${TARGET_DIR}/', safe=':/'))")
            find "hls_output/$TARGET_DIR" -name "*.m3u8" -exec sed -i -e "s|^[^#]|${HF_BASE}&|g" -e "s|URI=\"|URI=\"${HF_BASE}|g" {} + || true

            python3 metadata_builder.py "$VIDEO_FILE" "$BASE_DIR" "$SUB_DIR" "$DETECTED_AUDIO" "$DETECTED_ASS" "$FONTS_STR" || true
          done 9< <(find workspace -type f \( -name "*.mkv" -o -name "*.mp4" \))

      - name: Upload to Hugging Face
        if: env.found == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ANIME_REPO: ${{ secrets.HF_ANIME_REPO }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ.get('HF_TOKEN'))
          api.upload_large_folder(folder_path='hls_output', repo_id=os.environ.get('HF_ANIME_REPO'), repo_type='dataset', ignore_patterns=['*.torrent', '*.zip', 'temp_*'])
          "

      - name: Report to Discord
        if: always() && env.found == 'true'
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          QUEUE_CH: ${{ secrets.DISCORD_ANIME_CHANNEL_ID }}
          PING_CH: ${{ secrets.DISCORD_PING_CHANNEL_ID }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            TOTAL_FILES=$(find hls_output -type f | wc -l)
            ./discord_manager "$DISCORD_TOKEN" "$QUEUE_CH" delete "$MSG_ID"
            ./discord_manager "$DISCORD_TOKEN" "$PING_CH" send "✅ **Anime Uploaded!** \n\`${TOTAL_FILES} files (.ts, .ass, fonts)\`"
          else
            PAYLOAD=$(jq -n --arg c "❌ **Pipeline Failed!** \n🔗 [View Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" '{content: $c}')
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "https://discord.com/api/v10/channels/$PING_CH/messages"
          fi
